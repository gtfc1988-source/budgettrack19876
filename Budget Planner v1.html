function AffordChecker({buffer,pots,potAmount}){
  const[item,setItem]=useState('');const[cost,setCost]=useState('');
  const costN=parseFloat(cost)||0;const show=item.trim()&&costN>0;
  const results=useMemo(()=>{
    if(!show)return[];const r=[];
    if(buffer>=costN)r.push({ok:true,text:`Yes — your buffer covers this with ${gS(buffer-costN)} left over.`});
    else if(buffer>0)r.push({ok:false,text:`Buffer only covers ${gS(buffer)} of ${gS(costN)}. Short by ${gS(costN-buffer)}.`});
    else r.push({ok:false,text:'No buffer available right now.'});
    pots.filter(p=>p.kind==='fixed'&&Number(p.amount||0)>0).forEach(p=>{
      const a=potAmount(p);
      if(a>=costN)r.push({ok:true,text:`Yes if you use the ${p.emoji} ${p.name} pot (${gS(a)} available).`});
      else if(a>50)r.push({ok:false,text:`Partial: ${p.emoji} ${p.name} has ${gS(a)} — still ${gS(costN-a)} short.`})});
    if(costN>200)r.push({ok:true,text:`Yes if you split over 2 months (${gS(Math.ceil(costN/2))}/month).`});
    return r},[show,buffer,costN,pots]);
  return h('div',{className:'afford'},
    h('div',{className:'eb',style:{marginBottom:'.5rem'}},'🤔 Can I afford it?'),
    h('div',{className:'afford-row'},
      h('input',{className:'inp',placeholder:'What is it?',value:item,onChange:e=>setItem(e.target.value),style:{flex:1,minWidth:120}}),
      h(MI,{value:cost||'',onChange:v=>setCost(String(v)),cls:'inp',style:{width:100},wrapStyle:{flex:'0 0 auto'}})),
    show&&h('div',{style:{marginTop:'.5rem'}},
      results.map((r,i)=>h('div',{key:i,className:`afford-result ${r.ok?'insi':'insw'}`},r.text))))}

    h(Sec,{title:'Mortgage renewal — Jan 2028',right:`${gS(bAR)} projected`,icon:'🏠'},

        h('div',{style:{display:'flex',alignItems:'center',gap:'.5rem'}},h('span',{style:{fontSize:'.875rem'}},'Balance'),h(MI,{value:s.mortBalance,onChange:v=>set('mortBalance',v),style:{width:110},wrapCls:'mw-bare'})),
        h('div',{style:{display:'flex',alignItems:'center',gap:'.5rem'}},h('span',{style:{fontSize:'.875rem'}},'Rate %'),h(MI,{value:s.mortRate,onChange:v=>set('mortRate',v),style:{width:70}})),
        h('div',{style:{display:'flex',alignItems:'center',gap:'.5rem'}},h('span',{style:{fontSize:'.875rem'}},'Monthly DD'),h(MI,{value:s.mortPmt,onChange:v=>set('mortPmt',v),style:{width:100},wrapCls:'mw-bare'}))),
      h('div',{className:'mu',style:{marginBottom:'.75rem'}},`Projected balance at renewal: ${gS(bAR)} (${mtr} months out).`),
      h('table',{className:'tbl'},
        h('thead',null,h('tr',null,h('th',{className:'eb',style:{textAlign:'left'}},'Rate'),h('th',{className:'eb',style:{textAlign:'right'}},'New DD'),h('th',{className:'eb',style:{textAlign:'right'}},'Change'))),
        h('tbody',null,mr.map(r=>{const d=r.pmt-s.mortPmt;return h('tr',{key:r.rate,style:{borderTop:'1px solid var(--c-s200)'}},
          h('td',{className:'m',style:{padding:'.5rem'}},r.rate.toFixed(2)+'%'),
          h('td',{className:'m',style:{textAlign:'right',padding:'.5rem'}},gS(r.pmt)),
          h('td',{className:'m',style:{textAlign:'right',padding:'.5rem',color:d>0?'var(--c-er)':'var(--c-ok)'}},(d>0?'+':'')+gS(d)))})))),

    h('div',{style:{textAlign:'center',marginTop:'1.5rem'}},
      h('button',{className:'btn btn-sm',onClick:reset,style:{color:'var(--c-s500)'}},'Reset all to defaults')),
    h('div',{style:{textAlign:'center',marginTop:'.75rem',fontSize:'.7rem',color:'var(--c-s500)'}},'Saves automatically to your Supabase database'))
}

ReactDOM.createRoot(document.getElementById('root')).render(h(Gate,null,h(App)));
</script>
