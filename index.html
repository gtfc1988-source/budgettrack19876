<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<meta name="theme-color" content="#0066ff">
<title>Family Money Planner</title>
<style>
:root{
  --bg:#f5f6f8;--bg2:#eef0f3;--card:#ffffff;--text:#1a1d22;--muted:#6b7280;
  --line:#e5e7eb;--accent:#0066ff;--accent2:#0052cc;
  --good:#10b981;--warn:#f59e0b;--bad:#ef4444;
  --shadow:0 1px 3px rgba(0,0,0,.06),0 1px 2px rgba(0,0,0,.04);
  --shadow2:0 4px 12px rgba(0,0,0,.08);
}
.dark{
  --bg:#0f1115;--bg2:#1a1d22;--card:#1c1f25;--text:#e5e7eb;--muted:#9ca3af;
  --line:#2a2f36;--accent:#3b82f6;--accent2:#2563eb;
  --shadow:0 1px 3px rgba(0,0,0,.4);
  --shadow2:0 4px 12px rgba(0,0,0,.5);
}
*{box-sizing:border-box}
html,body{margin:0;padding:0;background:var(--bg);color:var(--text);font-family:-apple-system,BlinkMacSystemFont,"SF Pro Text","Segoe UI",Roboto,sans-serif;font-size:15px;line-height:1.45;-webkit-font-smoothing:antialiased}
.app{max-width:1120px;margin:0 auto;padding:18px 18px 60px}

/* Header */
.hdr{display:flex;align-items:center;justify-content:space-between;gap:12px;margin-bottom:14px;flex-wrap:wrap}
.hdr h1{margin:0;font-size:22px;font-weight:700;letter-spacing:-.3px;display:flex;align-items:center;gap:8px}
.hdr h1 .logo{font-size:24px}
.hdr .right{display:flex;gap:8px;align-items:center}
.icobtn{background:var(--card);border:1px solid var(--line);width:36px;height:36px;border-radius:10px;cursor:pointer;display:inline-flex;align-items:center;justify-content:center;color:var(--text);font-size:16px;padding:0}
.icobtn:hover{background:var(--bg2)}
.savedpill{font-size:11px;background:var(--good);color:#fff;padding:3px 8px;border-radius:8px;opacity:0;transition:opacity .3s;font-weight:600}
.savedpill.show{opacity:1}

/* Tabs */
.tabs{display:flex;gap:4px;background:var(--bg2);border-radius:12px;padding:4px;margin:0 0 8px;width:fit-content}
.tabs button{padding:8px 18px;border:0;background:transparent;border-radius:8px;font-weight:600;cursor:pointer;color:var(--muted);font-size:14px;transition:all .15s;display:inline-flex;align-items:center;gap:6px;font-family:inherit}
.tabs button.active{background:var(--card);color:var(--text);box-shadow:var(--shadow)}
.tabs button .ico{font-size:15px}
.subtabs{display:flex;gap:6px;margin-bottom:16px;overflow-x:auto;padding-bottom:4px;-webkit-overflow-scrolling:touch}
.subtabs::-webkit-scrollbar{height:0}
.subtabs button{padding:6px 12px;border:1px solid var(--line);background:var(--card);border-radius:20px;font-size:12px;color:var(--muted);cursor:pointer;display:inline-flex;align-items:center;gap:5px;white-space:nowrap;font-weight:500;transition:all .15s;font-family:inherit}
.subtabs button.active{background:var(--text);color:var(--bg);border-color:var(--text)}
.subtabs button:hover:not(.active){background:var(--bg2)}

/* Period */
.period{display:flex;gap:8px;align-items:center;margin-bottom:16px;flex-wrap:wrap}
.period select{padding:7px 12px;border:1px solid var(--line);border-radius:8px;background:var(--card);color:var(--text);font-size:14px;font-weight:500}
.period .pill{background:var(--card);border:1px solid var(--line);padding:6px 12px;border-radius:8px;font-size:13px;color:var(--muted);display:inline-flex;align-items:center;gap:5px}
.magic-btn{background:linear-gradient(135deg,#8b5cf6,#0066ff);color:#fff;border:0;padding:8px 16px;border-radius:8px;font-size:13px;font-weight:600;cursor:pointer;display:inline-flex;align-items:center;gap:6px;font-family:inherit;box-shadow:0 2px 8px rgba(139,92,246,.3);transition:transform .1s}
.magic-btn:hover{transform:translateY(-1px);box-shadow:0 4px 12px rgba(139,92,246,.4)}
.magic-btn:active{transform:translateY(0)}

/* Summary */
.summary{background:var(--card);border:1px solid var(--line);border-radius:14px;padding:14px 16px;margin-bottom:16px;display:grid;grid-template-columns:1fr 1fr 1fr;gap:14px;box-shadow:var(--shadow)}
@media(max-width:640px){.summary{grid-template-columns:1fr 1fr}}
.summary .item .lbl{font-size:11px;text-transform:uppercase;letter-spacing:.5px;color:var(--muted);margin-bottom:3px;font-weight:600;display:flex;align-items:center;gap:5px}
.summary .item .val{font-size:22px;font-weight:700;letter-spacing:-.3px}
.summary .item .sub{font-size:12px;color:var(--muted);margin-top:2px}
.health{display:inline-flex;align-items:center;gap:5px;padding:3px 10px;border-radius:20px;font-size:11px;font-weight:700;text-transform:uppercase;letter-spacing:.4px}
.health.good{background:rgba(16,185,129,.12);color:var(--good)}
.health.warn{background:rgba(245,158,11,.12);color:var(--warn)}
.health.bad{background:rgba(239,68,68,.12);color:var(--bad)}

/* Insights */
.insights{display:flex;flex-direction:column;gap:8px;margin-bottom:16px}
.ins{background:var(--card);border:1px solid var(--line);border-left:3px solid var(--accent);border-radius:10px;padding:10px 14px;font-size:13px;display:flex;align-items:flex-start;gap:10px}
.ins.warn{border-left-color:var(--warn);background:rgba(245,158,11,.04)}
.ins.alert{border-left-color:var(--bad);background:rgba(239,68,68,.04)}
.ins.good{border-left-color:var(--good);background:rgba(16,185,129,.04)}
.ins .ico{font-size:16px;line-height:1.3;flex-shrink:0}
.ins .body{flex:1}
.ins .body b{font-weight:600}
.ins .actions{display:flex;gap:6px;margin-top:6px;flex-wrap:wrap}
.ins .actions a, .ins .actions button{font-size:12px;font-weight:600;color:var(--accent);text-decoration:none;padding:4px 10px;border-radius:6px;background:rgba(0,102,255,.08);border:0;cursor:pointer;font-family:inherit}
.ins .actions a:hover, .ins .actions button:hover{background:rgba(0,102,255,.15)}

/* Pots */
.pots{display:grid;grid-template-columns:1fr 1fr;gap:12px;margin-bottom:16px}
@media(max-width:760px){.pots{grid-template-columns:1fr}}
.pot{background:var(--card);border:1px solid var(--line);border-radius:14px;padding:14px;box-shadow:var(--shadow);transition:all .15s}
.pot:hover{border-color:var(--muted)}
.pot.expanded{box-shadow:var(--shadow2)}
.pot .top{display:flex;align-items:center;gap:10px;cursor:pointer}
.pot .emoji{font-size:22px;width:32px;text-align:center}
.pot .name{flex:1;font-weight:600;font-size:15px}
.pot .amount{font-weight:700;font-size:18px;letter-spacing:-.3px}
.pot .pct{font-size:11px;color:var(--muted);margin-left:6px;font-weight:500}
.pot .auto-tag{font-size:10px;background:var(--bg2);color:var(--muted);padding:2px 6px;border-radius:4px;margin-left:6px;text-transform:uppercase;letter-spacing:.4px;font-weight:600}
.pot .body{margin-top:12px;padding-top:12px;border-top:1px solid var(--line)}
.pot .note{color:var(--muted);font-size:13px;margin:0 0 10px;font-style:italic}
.pot .auto-info{font-size:12px;color:var(--muted);margin-bottom:8px;padding:8px 10px;background:var(--bg2);border-radius:8px}
.pot .actions{display:flex;gap:6px;margin-top:10px;flex-wrap:wrap}
.pot .mini-bar{height:4px;background:var(--bg2);border-radius:3px;margin-top:6px;overflow:hidden}
.pot .mini-bar > div{height:100%;background:var(--accent);border-radius:3px;transition:width .3s}

.smbtn{background:transparent;border:1px solid var(--line);padding:5px 10px;border-radius:7px;font-size:12px;cursor:pointer;color:var(--text);font-weight:500;font-family:inherit}
.smbtn:hover{background:var(--bg2)}
.smbtn.danger{color:var(--bad);border-color:rgba(239,68,68,.2)}
.smbtn.danger:hover{background:rgba(239,68,68,.06)}
.smbtn.primary{background:var(--accent);color:#fff;border-color:var(--accent)}
.smbtn.primary:hover{background:var(--accent2)}

/* Inputs */
.mw{position:relative;display:inline-block}
.mw::before{content:'£';position:absolute;left:8px;top:50%;transform:translateY(-50%);color:var(--muted);font-size:13px;pointer-events:none}
.mw input{padding-left:20px}
input,select,textarea{padding:6px 10px;border:1px solid var(--line);border-radius:7px;background:var(--card);color:var(--text);font-size:14px;font-family:inherit}
input:focus,select:focus,textarea:focus{outline:none;border-color:var(--accent)}
.amt-input{width:90px;text-align:right;font-variant-numeric:tabular-nums}

/* Sub-items */
.items{display:flex;flex-direction:column;gap:6px}
.item-row{display:flex;align-items:center;gap:8px;padding:6px 0;border-bottom:1px solid var(--line)}
.item-row:last-child{border-bottom:0}
.item-name{flex:1;border:0;background:transparent;padding:4px}
.item-name:focus{background:var(--bg2);border-radius:4px}
.item-row .del{background:transparent;border:0;color:var(--muted);cursor:pointer;font-size:18px;padding:0 4px}
.item-changes{font-size:10px;background:rgba(0,102,255,.1);color:var(--accent);padding:2px 6px;border-radius:4px;font-weight:600;cursor:help}
.add-item{display:flex;gap:6px;margin-top:8px;padding-top:8px;border-top:1px dashed var(--line)}

/* Sections */
.section{background:var(--card);border:1px solid var(--line);border-radius:14px;padding:16px;margin-bottom:16px;box-shadow:var(--shadow)}
.section h2{margin:0 0 12px;font-size:16px;font-weight:600;display:flex;align-items:center;gap:6px}
.section h2 .sub{font-size:12px;color:var(--muted);font-weight:400;margin-left:6px}

table{width:100%;border-collapse:collapse;font-size:13px}
table th{text-align:left;padding:8px;color:var(--muted);font-weight:600;font-size:11px;text-transform:uppercase;letter-spacing:.5px;border-bottom:1px solid var(--line)}
table td{padding:7px 8px;border-bottom:1px solid var(--line)}
table tr:last-child td{border-bottom:0}
.tabnum{font-variant-numeric:tabular-nums}

/* Energy */
.en-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:12px;margin-bottom:14px}
@media(max-width:760px){.en-grid{grid-template-columns:1fr}}
.en-grid.two{grid-template-columns:1fr 1fr}
@media(max-width:760px){.en-grid.two{grid-template-columns:1fr}}
.en-stat{background:var(--card);border:1px solid var(--line);border-radius:14px;padding:14px;box-shadow:var(--shadow)}
.en-stat .lbl{font-size:11px;text-transform:uppercase;letter-spacing:.5px;color:var(--muted);margin-bottom:4px;font-weight:600;display:flex;align-items:center;gap:5px}
.en-stat .val{font-size:22px;font-weight:700;letter-spacing:-.3px}
.en-stat .val.sm{font-size:15px}
.en-stat .sub{font-size:12px;color:var(--muted);margin-top:3px}
.en-stat.warn{border-color:var(--warn);background:rgba(245,158,11,.04)}
.en-stat.good{border-color:var(--good);background:rgba(16,185,129,.04)}
.en-stat.bad{border-color:var(--bad);background:rgba(239,68,68,.04)}

.en-link{background:rgba(0,102,255,.06);border:1px solid rgba(0,102,255,.2);border-radius:10px;padding:12px 14px;font-size:13px;display:flex;justify-content:space-between;align-items:center;margin-bottom:14px;flex-wrap:wrap;gap:10px}
.en-link .controls{display:flex;gap:8px;align-items:center;flex-wrap:wrap}
.en-link select{font-size:13px}

.en-form{display:grid;grid-template-columns:130px 160px 1fr 110px;gap:8px;background:var(--card);border:1px solid var(--line);border-radius:14px;padding:14px;margin-bottom:16px;box-shadow:var(--shadow)}
@media(max-width:760px){.en-form{grid-template-columns:1fr 1fr}}

.en-chart-toggle{display:inline-flex;background:var(--bg2);border-radius:8px;padding:3px;font-size:12px;margin-left:auto}
.en-chart-toggle button{border:0;background:transparent;padding:5px 11px;border-radius:6px;cursor:pointer;color:var(--muted);font-weight:600;font-family:inherit}
.en-chart-toggle button.active{background:var(--card);color:var(--text);box-shadow:var(--shadow)}

.en-legend{display:flex;gap:14px;font-size:12px;color:var(--muted);margin-bottom:8px;align-items:center;flex-wrap:wrap}
.en-legend span{display:inline-flex;align-items:center;gap:6px}
.en-legend i{display:inline-block;width:10px;height:10px;border-radius:2px}

.en-source{font-size:10px;padding:2px 6px;border-radius:4px;background:var(--bg2);color:var(--muted);text-transform:uppercase;letter-spacing:.4px;font-weight:600}
.en-source.manual{background:#fef3c7;color:#92400e}
.dark .en-source.manual{background:#3d2c0a;color:#fbbf24}

/* Renewals */
.ren-row{background:var(--card);border:1px solid var(--line);border-radius:12px;padding:12px 14px;margin-bottom:8px;display:grid;grid-template-columns:32px 1fr auto auto;gap:12px;align-items:center;box-shadow:var(--shadow)}
@media(max-width:640px){.ren-row{grid-template-columns:32px 1fr;grid-template-rows:auto auto}}
.ren-row .ico{font-size:22px}
.ren-row .name{font-weight:600;font-size:14px}
.ren-row .meta{font-size:12px;color:var(--muted);margin-top:2px}
.ren-row .urgency{font-size:11px;font-weight:700;padding:4px 10px;border-radius:14px;white-space:nowrap;text-align:center}
.ren-row .urgency.alert{background:rgba(239,68,68,.12);color:var(--bad)}
.ren-row .urgency.warn{background:rgba(245,158,11,.12);color:var(--warn)}
.ren-row .urgency.calm{background:rgba(16,185,129,.1);color:var(--good)}
.ren-row .urgency.past{background:rgba(0,0,0,.08);color:var(--muted)}
.dark .ren-row .urgency.past{background:rgba(255,255,255,.08)}
.ren-row .actions{display:flex;gap:4px}
.ren-form{background:var(--card);border:1px solid var(--line);border-radius:14px;padding:14px;box-shadow:var(--shadow);display:grid;grid-template-columns:140px 1fr 1fr 130px 100px 90px;gap:8px;margin-bottom:14px;align-items:end}
@media(max-width:760px){.ren-form{grid-template-columns:1fr 1fr}}

/* Goals */
.goal{background:var(--card);border:1px solid var(--line);border-radius:14px;padding:14px;margin-bottom:10px;box-shadow:var(--shadow)}
.goal .gh{display:flex;justify-content:space-between;align-items:center;margin-bottom:8px;gap:8px;flex-wrap:wrap}
.goal .gname{font-weight:600;font-size:15px;display:flex;align-items:center;gap:8px}
.goal .gnums{font-size:13px;color:var(--muted);font-variant-numeric:tabular-nums}
.goal .gnums b{color:var(--text);font-weight:700}
.goal .bar{height:8px;background:var(--bg2);border-radius:6px;overflow:hidden;margin:6px 0}
.goal .bar > div{height:100%;background:var(--accent);border-radius:6px;transition:width .3s}
.goal .bar > div.good{background:var(--good)}
.goal .gmeta{font-size:12px;color:var(--muted);margin-top:6px;display:flex;justify-content:space-between;flex-wrap:wrap;gap:8px}

/* Mortgage */
.scen-grid{display:grid;grid-template-columns:1fr 1fr;gap:12px;margin-bottom:14px}
@media(max-width:760px){.scen-grid{grid-template-columns:1fr}}
.scen{background:var(--card);border:1px solid var(--line);border-radius:14px;padding:14px;box-shadow:var(--shadow)}
.scen h3{margin:0 0 8px;font-size:13px;color:var(--muted);text-transform:uppercase;letter-spacing:.4px}
.scen .big{font-size:22px;font-weight:700;letter-spacing:-.3px}
.scen .delta{font-size:13px;color:var(--good);margin-top:3px;font-weight:600}
.scen .delta.bad{color:var(--bad)}

/* Confirm modal */
.modal-bg{position:fixed;inset:0;background:rgba(0,0,0,.5);display:flex;align-items:center;justify-content:center;padding:20px;z-index:100;animation:fadein .15s}
@keyframes fadein{from{opacity:0}to{opacity:1}}
.modal{background:var(--card);border-radius:14px;padding:20px;max-width:440px;width:100%;box-shadow:0 20px 60px rgba(0,0,0,.3)}
.modal h3{margin:0 0 8px;font-size:18px;display:flex;align-items:center;gap:8px}
.modal p{margin:0 0 16px;color:var(--muted);font-size:14px;line-height:1.5}
.modal .preview{background:var(--bg2);border-radius:8px;padding:10px 12px;margin-bottom:14px;font-size:13px;max-height:200px;overflow-y:auto}
.modal .preview .row{display:flex;justify-content:space-between;padding:3px 0;font-variant-numeric:tabular-nums}
.modal .actions{display:flex;gap:8px;justify-content:flex-end}
.modal .actions button{padding:8px 16px;border-radius:8px;border:0;font-weight:600;cursor:pointer;font-size:14px;font-family:inherit}
.modal .actions .cancel{background:var(--bg2);color:var(--text)}
.modal .actions .confirm{background:var(--accent);color:#fff}
.modal .actions .confirm.danger{background:var(--bad)}

/* Login */
.login-bg{position:fixed;inset:0;background:linear-gradient(135deg,#0066ff 0%,#0044cc 100%);display:flex;align-items:center;justify-content:center;padding:20px}
.login-card{background:var(--card);border-radius:18px;padding:32px;width:100%;max-width:380px;box-shadow:0 20px 60px rgba(0,0,0,.2)}
.login-card h1{margin:0 0 6px;font-size:24px;color:var(--text)}
.login-card p{margin:0 0 20px;color:var(--muted);font-size:14px}
.login-card input{width:100%;padding:12px;font-size:15px;margin-bottom:12px}
.login-card button{width:100%;padding:12px;background:#0066ff;color:#fff;border:0;border-radius:8px;font-size:15px;font-weight:600;cursor:pointer;font-family:inherit}
.login-error{color:var(--bad);font-size:13px;margin-top:8px}

/* Misc */
.muted{color:var(--muted)}
.row{display:flex;gap:8px;align-items:center}
.spaced{display:flex;justify-content:space-between;align-items:center;gap:10px}
hr.sep{border:0;border-top:1px solid var(--line);margin:14px 0}
.checker{background:var(--bg2);border-radius:10px;padding:12px;margin-top:10px}
.checker .out{margin-top:10px;font-size:13px}
.empty{padding:24px;text-align:center;color:var(--muted);font-size:13px}
.empty .big{font-size:28px;margin-bottom:8px}
</style>
</head>
<body>
<div id="root"></div>

<script crossorigin src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
<script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
<script src="https://unpkg.com/@supabase/supabase-js@2"></script>

<script>
'use strict';
const { useState, useEffect, useMemo, useRef, Fragment } = React;
const h = React.createElement;

/* ============ SUPABASE ============ */
const SUPABASE_URL = 'https://wppzwukmestyyqioakql.supabase.co';
const SUPABASE_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6IndwcHp3dWttZXN0eXlxaW9ha3FsIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzYzMzk0OTQsImV4cCI6MjA5MTkxNTQ5NH0.9IGtaWVB8WvJqe-6YszXBVm-tSVjjGs9u3KPONl1FM4';
const PASSWORD = '22b59b42-7057-4c4b-ba66-b8f564e66df2';
const supa = window.supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

async function loadKey(key, fallback){
  try{
    const { data, error } = await supa.from('kv_store').select('value').eq('key', key).maybeSingle();
    if(error) throw error;
    return data ? data.value : fallback;
  }catch(e){ console.error('load',key,e); return fallback; }
}
async function saveKey(key, value){
  try{
    await supa.from('kv_store').upsert({ key, value, updated_at: new Date().toISOString() });
    return true;
  }catch(e){ console.error('save',key,e); return false; }
}

/* ============ FORMATTERS ============ */
const g0 = n => '£' + Math.round(n||0).toLocaleString('en-GB');
const g2 = n => '£' + (n||0).toFixed(2);
const gS = n => { const v = n||0; return Number.isInteger(v) ? '£'+v.toLocaleString('en-GB') : '£'+v.toFixed(2); };
const newId = () => Math.random().toString(36).slice(2,9);
const fmtDate = d => new Date(d).toLocaleDateString('en-GB',{day:'2-digit',month:'short',year:'numeric'});
const fmtShort = d => new Date(d).toLocaleDateString('en-GB',{day:'2-digit',month:'short'});
const fmtMon = d => new Date(d).toLocaleDateString('en-GB',{month:'short',year:'numeric'});
const dDay = (a,b) => Math.round((new Date(b)-new Date(a))/86400000);

/* ============ BANK HOLIDAYS ============ */
const BANK_HOLS = new Set([
  '2025-01-01','2025-04-18','2025-04-21','2025-05-05','2025-05-26','2025-08-25','2025-12-25','2025-12-26',
  '2026-01-01','2026-04-03','2026-04-06','2026-05-04','2026-05-25','2026-08-31','2026-12-25','2026-12-28',
  '2027-01-01','2027-03-26','2027-03-29','2027-05-03','2027-05-31','2027-08-30','2027-12-27','2027-12-28',
  '2028-01-03','2028-04-14','2028-04-17','2028-05-01','2028-05-29','2028-08-28','2028-12-25','2028-12-26'
]);
function isWorking(d){ const dow = d.getDay(); if(dow===0||dow===6) return false; return !BANK_HOLS.has(d.toISOString().slice(0,10)); }
function paydayFor(year, monthIdx){
  let d = new Date(year, monthIdx, 21);
  while(!isWorking(d)){ d.setDate(d.getDate()-1); }
  return d;
}
function nextPayday(d){ return paydayFor(d.getFullYear(), d.getMonth()+1); }
function countDow(start, end, dow){
  let n = 0; const cur = new Date(start);
  while(cur < end){ if(cur.getDay()===dow) n++; cur.setDate(cur.getDate()+1); }
  return n;
}

/* ============ EFFECTIVE-AMOUNT HELPERS ============ */
function itemEffectiveAmount(item, year, monthIdx){
  if(!item.changes || item.changes.length === 0) return +item.amount || 0;
  const period = new Date(year, monthIdx, 1);
  const past = item.changes.filter(c => new Date(c.effectiveFrom) <= period);
  if(past.length === 0) return +item.amount || 0;
  past.sort((a,b) => new Date(b.effectiveFrom) - new Date(a.effectiveFrom));
  return +past[0].amount || 0;
}
function updateItemAmountForPeriod(item, year, monthIdx, newAmount){
  if(!item.changes || item.changes.length === 0) return { ...item, amount: newAmount };
  const period = new Date(year, monthIdx, 1);
  const past = item.changes.filter(c => new Date(c.effectiveFrom) <= period);
  if(past.length === 0) return { ...item, amount: newAmount };
  past.sort((a,b) => new Date(b.effectiveFrom) - new Date(a.effectiveFrom));
  const activeId = past[0].id;
  return { ...item, changes: item.changes.map(c => c.id === activeId ? { ...c, amount: newAmount } : c) };
}
function scheduleItemChange(item, effectiveFrom, newAmount, note){
  const changes = (item.changes || []).filter(c => c.effectiveFrom !== effectiveFrom);
  changes.push({ id:newId(), effectiveFrom, amount:newAmount, note });
  return { ...item, changes };
}

/* ============ POT AMOUNT ============ */
function potAmount(pot, ctx){
  switch(pot.kind){
    case 'list': return (pot.items||[]).reduce((s,i)=>s + itemEffectiveAmount(i, ctx.payday.getFullYear(), ctx.payday.getMonth()), 0);
    case 'fixed': return +pot.amount || 0;
    case 'auto-shopping': return ctx.weekends * (ctx.settings.shopRate||0);
    case 'auto-afterschool': return ctx.fridays * (ctx.settings.friRate||0);
    case 'auto-birthdays': {
      const start = new Date(ctx.payday); start.setDate(start.getDate()+7);
      const end = new Date(ctx.nextPayday); end.setDate(end.getDate()+7);
      return ctx.birthdays.reduce((s,b)=>{
        const yr = start.getFullYear();
        for(const y of [yr, yr+1]){
          const bd = new Date(y, (b.month||1)-1, b.day||1);
          if(bd >= start && bd < end) return s + (+b.amount||0);
        }
        return s;
      }, 0);
    }
    case 'auto-annual':
      return ctx.annual.filter(e => e.pay_month === ctx.payday.getMonth())
                       .reduce((s,e)=>s+(+e.amount||0), 0);
    default: return 0;
  }
}

function buildPeriodCtx({ year, monthIdx, settings, birthdays, annual }){
  const payday = paydayFor(year, monthIdx);
  const np = nextPayday(payday);
  return {
    payday, nextPayday: np,
    weekends: countDow(payday, np, 6),
    fridays: countDow(payday, np, 5),
    settings, birthdays, annual
  };
}

/* ============ ENERGY HELPERS ============ */
function periodCost(usage, days, unitRate, standingCharge){ return (usage*unitRate + days*standingCharge)/100; }

function buildMonthlyCostSeries(readings, tariff){
  const out = { elec: [], gas: [] };
  ['elec','gas'].forEach(type=>{
    const rs = readings.filter(r=>r.type===type).sort((a,b)=>new Date(a.date)-new Date(b.date));
    const byMonth = {};
    rs.forEach(r=>{
      const key = r.date.slice(0,7);
      if(!byMonth[key] || new Date(r.date)>new Date(byMonth[key].date)) byMonth[key]=r;
    });
    const months = Object.keys(byMonth).sort();
    for(let i=1;i<months.length;i++){
      const a = byMonth[months[i-1]], b = byMonth[months[i]];
      // Skip if gap between months is huge (e.g. 2023->2025 historic gap)
      const gap = dDay(a.date, b.date);
      if(gap > 100) continue;
      const usage = b.value - a.value;
      const days = gap;
      const t = tariff[type];
      const cost = periodCost(usage, days, t.unitRate, t.standingCharge);
      out[type].push({ x: b.date, y: cost, usage, days });
    }
  });
  return out;
}

function buildAllReadingSeries(readings){
  const out = { elec: [], gas: [] };
  ['elec','gas'].forEach(type=>{
    const rs = readings.filter(r=>r.type===type).sort((a,b)=>new Date(a.date)-new Date(b.date));
    out[type] = rs.map(r=>({ x: r.date, y: r.value }));
  });
  return out;
}

function computeEnergyInsights(readings, tariff, account){
  const today = new Date();
  const out = { elec:{empty:true}, gas:{empty:true} };
  ['elec','gas'].forEach(type=>{
    const rs = readings.filter(r=>r.type===type).sort((a,b)=>new Date(a.date)-new Date(b.date));
    if(rs.length<2) return;
    const latest = rs[rs.length-1];
    const target = new Date(latest.date); target.setDate(target.getDate()-30);
    let prior = rs[0];
    for(const r of rs){ if(new Date(r.date)<=target) prior=r; else break; }
    if(prior===latest && rs.length>=2) prior = rs[Math.max(0,rs.length-2)];
    const usage30 = latest.value - prior.value;
    const days30 = Math.max(1, dDay(prior.date, latest.date));
    const dailyKwh = usage30/days30;
    const t = tariff[type];
    const monthCost = periodCost(dailyKwh*30, 30, t.unitRate, t.standingCharge);
    // YoY: find reading ~365 days before latest
    const yoyDate = new Date(latest.date); yoyDate.setFullYear(yoyDate.getFullYear()-1);
    let yoyA = null;
    for(const r of rs){
      if(!yoyA || Math.abs(dDay(r.date,yoyDate)) < Math.abs(dDay(yoyA.date,yoyDate))) yoyA = r;
    }
    let yoyChange = null, yoyUsage30 = null;
    if(yoyA && Math.abs(dDay(yoyA.date,yoyDate))<25){
      const yoyTarget = new Date(yoyA.date); yoyTarget.setDate(yoyTarget.getDate()+30);
      let yoyB = null;
      for(const r of rs){
        if(new Date(r.date) <= new Date(yoyA.date)) continue;
        if(!yoyB || Math.abs(dDay(r.date,yoyTarget)) < Math.abs(dDay(yoyB.date,yoyTarget))) yoyB = r;
      }
      if(yoyB && Math.abs(dDay(yoyB.date,yoyTarget))<20){
        const yU = yoyB.value - yoyA.value;
        const yD = Math.max(1, dDay(yoyA.date, yoyB.date));
        yoyUsage30 = (yU/yD)*30;
        yoyChange = ((dailyKwh*30 - yoyUsage30) / yoyUsage30) * 100;
      }
    }
    // 2yr-ago comparison (e.g. 2023 historic)
    const twoYrDate = new Date(latest.date); twoYrDate.setFullYear(twoYrDate.getFullYear()-2);
    let twoYrA = null;
    for(const r of rs){
      if(!twoYrA || Math.abs(dDay(r.date,twoYrDate)) < Math.abs(dDay(twoYrA.date,twoYrDate))) twoYrA = r;
    }
    let twoYrChange = null;
    if(twoYrA && Math.abs(dDay(twoYrA.date,twoYrDate))<60){
      const twoTarget = new Date(twoYrA.date); twoTarget.setDate(twoTarget.getDate()+30);
      let twoYrB = null;
      for(const r of rs){
        if(new Date(r.date) <= new Date(twoYrA.date)) continue;
        if(!twoYrB || Math.abs(dDay(r.date,twoTarget)) < Math.abs(dDay(twoYrB.date,twoTarget))) twoYrB = r;
      }
      if(twoYrB && Math.abs(dDay(twoYrB.date,twoTarget))<25){
        const tU = twoYrB.value - twoYrA.value;
        const tD = Math.max(1, dDay(twoYrA.date, twoYrB.date));
        const twoYrUsage30 = (tU/tD)*30;
        twoYrChange = ((dailyKwh*30 - twoYrUsage30) / twoYrUsage30) * 100;
      }
    }
    const daysSinceLast = dDay(latest.date, today);
    out[type] = { latest, prior, dailyKwh, monthCost, usage30, days30, yoyChange, yoyUsage30, twoYrChange, daysSinceLast };
  });
  const totalMonthly = (out.elec.monthCost||0)+(out.gas.monthCost||0);
  const ddDelta = account.monthlyDD - totalMonthly;
  const endDate = new Date(tariff.endDate);
  const daysToEnd = dDay(today, endDate);
  return { ...out, totalMonthly, ddDelta, daysToEnd, endDate };
}

// Suggested DD = (annual cost + 1mo buffer + clear current debit) / 12
function suggestedDD(insights, account){
  if(insights.totalMonthly <= 0) return null;
  const annual = insights.totalMonthly * 12;
  const buffer = insights.totalMonthly; // 1 month buffer
  const debitToClear = account.balance < 0 ? Math.abs(account.balance) : 0;
  const credit = account.balance > 0 ? account.balance : 0;
  // round to nearest pound
  const total = annual + buffer + debitToClear - credit;
  return Math.max(0, Math.round(total / 12));
}

  const list = [];
  const today = new Date();

  // 1. Tariff end reminder
  if(insights.daysToEnd != null){

      list.push({ type:'alert', ico:'\u26a0\ufe0f', text:`Your tariff ended ${Math.abs(insights.daysToEnd)} days ago — you may be on a default rate.`, actions:[{label:'Compare on MSE',url:MSE_ENERGY_URL}] });
    } else if(insights.daysToEnd < 30){
      list.push({ type:'alert', ico:'\u26a0\ufe0f', text:`Tariff ends in ${insights.daysToEnd} days. Switch now to avoid the standard variable rate.`, actions:[{label:'Compare on MSE',url:MSE_ENERGY_URL}] });
    } else if(insights.daysToEnd < 90){
      list.push({ type:'warn', ico:'\u23f0', text:`Tariff ends in ${insights.daysToEnd} days. Start comparing — switching can take 2 weeks.`, actions:[{label:'Compare on MSE',url:MSE_ENERGY_URL}] });
    } else {
      list.push({ type:'tip', ico:'\ud83d\udcc5', text:`Tariff ends ${fmtDate(tariff.endDate)} — ${insights.daysToEnd} days away.` });
    }
  }

  // 2. Market scan
  if(marketScan && marketScan.checked){
    if(marketScan.cheaperFound){
      list.push({
        type:'good',
        ico:'\ud83d\udcb1',
        text:`Market scan: cheaper deals may be available. MSE's Cheap Energy Club is currently showing fixed rates worth checking.`,
        actions:[{label:'Open MSE Energy Club',url:MSE_ENERGY_URL}]
      });
    } else {
      list.push({ type:'tip', ico:'\ud83d\udd0d', text:`Last market scan ${marketScan.daysAgo === 0 ? 'today' : marketScan.daysAgo + ' days ago'}: your tariff still looks competitive vs MSE's listed deals.` });
    }
  }

  // 3. DD vs projected with concrete suggestion
  if(insights.totalMonthly > 0){
    const delta = insights.ddDelta;
    const sugg = suggestedDD(insights, account);
    if(delta < -15){
      list.push({ type:'warn', ico:'\ud83d\udcb0', text:`DD of ${g2(account.monthlyDD)} is ~${g2(Math.abs(delta))} below projected cost (${g2(insights.totalMonthly)}). Consider increasing to ${g2(sugg)} to stay in credit.` });
    } else if(delta < -5){
      list.push({ type:'tip', ico:'\ud83d\udcb0', text:`DD is ${g2(Math.abs(delta))}/mo below projected use. Worth reviewing in winter.` });
    } else if(delta > 25 && sugg !== null){
      const saving = account.monthlyDD - sugg;
      list.push({
        type:'good',
        ico:'\ud83d\udcb0',
        text:`DD is ${g2(delta)}/mo above projected use. Suggest reducing to ${g2(sugg)}/mo (saves ${g2(saving)}/mo, ~${g0(saving*12)}/yr). Covers annual usage + 1mo buffer + clears current ${account.balance<0?'debit':'credit adjustment'}.`,
        actions:[{label:'Apply suggestion',action:'applyDDSuggestion',value:sugg}]
      });
    } else {
      list.push({ type:'good', ico:'\u2705', text:`DD of ${g2(account.monthlyDD)} closely matches projected cost (${g2(insights.totalMonthly)}). Well-pitched.` });
    }
  }

  // 4. Account balance context
  if(account.balance < -50){
    list.push({ type:'warn', ico:'\ud83d\udcc9', text:`Account is ${g2(Math.abs(account.balance))} in debit. Normal after winter — should clear by ~August at current DD.` });
  } else if(account.balance < 0 && month >= 3 && month <= 8){
    list.push({ type:'tip', ico:'\ud83c\udf3f', text:`${g2(Math.abs(account.balance))} in debit — typical post-winter. Should reduce as gas use drops over spring.` });
  } else if(account.balance > 100){
    list.push({ type:'good', ico:'\ud83d\udcc8', text:`${g2(account.balance)} in credit — useful buffer ahead of winter.` });
  }

  // 5. YoY changes
  ['elec','gas'].forEach(type=>{
    const ins = insights[type];
    const label = type==='elec' ? 'Electricity' : 'Gas';
    if(ins.yoyChange != null){
      const pct = Math.abs(ins.yoyChange).toFixed(0);
      if(ins.yoyChange > 25){
        list.push({ type:'warn', ico:'\u26a1', text:`${label} usage up ${pct}% vs same period last year.` });
      } else if(ins.yoyChange < -15){
        list.push({ type:'good', ico:'\u26a1', text:`${label} usage down ${pct}% vs last year — efficiency gains paying off.` });
      }
    }
    if(ins.twoYrChange != null && Math.abs(ins.twoYrChange) > 30){
      const pct = Math.abs(ins.twoYrChange).toFixed(0);
      list.push({
        type: ins.twoYrChange > 0 ? 'tip' : 'good',
        ico:'\ud83d\udcca',
        text:`${label} usage is ${ins.twoYrChange > 0 ? 'up' : 'down'} ${pct}% vs 2 years ago (2023).`
      });
    }
  });

  // 6. Reading recency
  ['elec','gas'].forEach(type=>{
    const ins = insights[type];
    if(ins.empty) return;
    if(ins.daysSinceLast > 21){
      list.push({ type:'tip', ico:'\ud83d\udcca', text:`Last ${type==='elec'?'electricity':'gas'} reading was ${ins.daysSinceLast} days ago. A fresh reading sharpens these insights.` });
    }
  });

  // 7. Seasonal context
  if(month >= 9 || month <= 1){
    list.push({ type:'tip', ico:'\u2744\ufe0f', text:`Winter usage typically runs 50–80% higher than summer.` });
  } else if(month >= 2 && month <= 4){
    const gasCost = (insights.gas && insights.gas.monthCost) || 0;
    if(gasCost > 30){
      list.push({ type:'good', ico:'\ud83c\udf38', text:`Heading into lower-usage months. Gas use should drop sharply over the next 2–3 months.` });
    }
  } else if(month >= 5 && month <= 8){
    list.push({ type:'tip', ico:'\u2600\ufe0f', text:`Summer is the cheapest period. Building credit now helps absorb winter spikes.` });
  }

  return list;
}

/* ============ LINE CHART ============ */
function LineChart({ series, height=220, formatY=v=>v, formatX=fmtShort }){
  const W=720, H=height, pad={t:14,r:18,b:32,l:54};
  const all = series.flatMap(s=>s.points);
  if(all.length<2) return h('div',{style:{padding:'30px',color:'var(--muted)',textAlign:'center',fontSize:'13px'}},'Not enough data yet — add more readings to see trends.');
  const xs = all.map(p=>+new Date(p.x));
  const ys = all.map(p=>p.y);
  const xMin=Math.min(...xs), xMax=Math.max(...xs);
  const yMaxRaw = Math.max(...ys);
  const yMax = yMaxRaw > 0 ? yMaxRaw*1.12 : 1;
  const yMin=0;
  const sx = x => pad.l + ((+new Date(x)-xMin)/(xMax-xMin||1))*(W-pad.l-pad.r);
  const sy = y => H-pad.b - ((y-yMin)/(yMax-yMin||1))*(H-pad.t-pad.b);
  const ticks=4;
  const yTicks=Array.from({length:ticks+1},(_,i)=>yMin+(yMax-yMin)*i/ticks);
  return h('svg',{viewBox:`0 0 ${W} ${H}`,style:{width:'100%',height:'auto',maxHeight:H+'px',display:'block'}},
    yTicks.map((t,i)=>h('g',{key:'y'+i},
      h('line',{x1:pad.l,x2:W-pad.r,y1:sy(t),y2:sy(t),stroke:'var(--line)',strokeWidth:1}),
      h('text',{x:pad.l-8,y:sy(t)+4,fontSize:11,fill:'var(--muted)',textAnchor:'end'},formatY(t))
    )),
    series.map((s,si)=>{
      const pts = s.points.slice().sort((a,b)=>+new Date(a.x)-+new Date(b.x));
      if(pts.length<2) return null;
      // Break path on big time gaps
      const segments = [];
      let cur = [pts[0]];
      for(let i=1;i<pts.length;i++){
        const gap = dDay(pts[i-1].x, pts[i].x);
        if(gap > 100){ segments.push(cur); cur = [pts[i]]; }
        else cur.push(pts[i]);
      }
      segments.push(cur);
      return h('g',{key:'s'+si},
        segments.map((seg, segi) => {
          if(seg.length<2) return null;
          const path = seg.map((p,i)=>(i?'L':'M')+sx(p.x)+','+sy(p.y)).join(' ');
          return h('path',{key:'seg'+segi,d:path,fill:'none',stroke:s.color,strokeWidth:2.2,strokeLinecap:'round',strokeLinejoin:'round'});
        }),
        pts.map((p,i)=>h('circle',{key:i,cx:sx(p.x),cy:sy(p.y),r:3.5,fill:s.color,stroke:'var(--card)',strokeWidth:1.5},
          h('title',null,`${formatX(p.x)}: ${formatY(p.y)}`)
        ))
      );
    }),
    [0,0.25,0.5,0.75,1].map((f,i)=>{
      const x = xMin+(xMax-xMin)*f;
      return h('text',{key:'x'+i,x:pad.l+f*(W-pad.l-pad.r),y:H-10,fontSize:11,fill:'var(--muted)',textAnchor:'middle'},formatX(new Date(x).toISOString().slice(0,10)));
    })
  );
}

}

/* ============ POT CARD ============ */
function PotCard({ pot, ctx, settings, onChange, onDelete, onMoveUp, onMoveDown, isFirst, isLast, income }){
  const [expanded, setExpanded] = useState(false);
  const amount = potAmount(pot, ctx);
  const pct = income > 0 ? Math.round((amount/income)*100) : 0;
  const year = ctx.payday.getFullYear();
  const monthIdx = ctx.payday.getMonth();
  const [confirmDel, setConfirmDel] = useState(false);
  const [confirmClearChanges, setConfirmClearChanges] = useState(null);

  function update(patch){ onChange({ ...pot, ...patch }); }
  function updateItemAmount(itemId, newAmount){
    update({ items: pot.items.map(i => i.id===itemId ? updateItemAmountForPeriod(i, year, monthIdx, newAmount) : i) });
  }
  function updateItemName(itemId, name){
    update({ items: pot.items.map(i => i.id===itemId ? { ...i, name } : i) });
  }
  function delItem(itemId){
    if(confirm('Remove this item?')) update({ items: pot.items.filter(i => i.id!==itemId) });
  }
  function addItem(){
    update({ items: [...(pot.items||[]), { id:newId(), name:'New item', amount:0 }] });
  }
  function clearItemSchedule(itemId){
    update({ items: pot.items.map(i => i.id===itemId ? { ...i, changes: [] } : i) });
    setConfirmClearChanges(null);
  }

  const isAuto = pot.kind && pot.kind.startsWith('auto');
  const autoLabel = pot.kind==='auto-shopping' ? `${ctx.weekends} weekends \u00d7 ${g0(settings.shopRate)} = ${g2(amount)}`
                  : pot.kind==='auto-afterschool' ? `${ctx.fridays} Fridays \u00d7 ${g0(settings.friRate)} = ${g2(amount)}`
                  : pot.kind==='auto-birthdays' ? `Auto-pulled from birthdays in window`
                  : pot.kind==='auto-annual' ? `Pulled from calendar events for ${MONTH_NAMES[monthIdx]}` : '';

  return h(Fragment, null,
    confirmDel && h(ConfirmModal,{
      title:'Delete pot?', ico:'\ud83d\uddd1\ufe0f', danger:true,
      message:`Remove "${pot.name}" from your budget? This affects every month, not just ${MONTH_NAMES[monthIdx]}.`,
      confirmLabel:'Delete pot',
      onConfirm:()=>{ setConfirmDel(false); onDelete(); },
      onCancel:()=>setConfirmDel(false)
    }),
    confirmClearChanges && h(ConfirmModal,{
      title:'Clear scheduled changes?', ico:'\ud83d\udcc5',
      message:`Remove all scheduled future amounts for "${confirmClearChanges.name}"? It will revert to the base amount everywhere.`,
      confirmLabel:'Clear schedule', danger:true,
      onConfirm:()=>clearItemSchedule(confirmClearChanges.id),
      onCancel:()=>setConfirmClearChanges(null)
    }),
    h('div',{className:'pot' + (expanded ? ' expanded' : '')},
      h('div',{className:'top',onClick:()=>setExpanded(!expanded)},
        h('span',{className:'emoji'}, pot.emoji || '\ud83d\udcb0'),
        h('span',{className:'name'}, pot.name, isAuto && h('span',{className:'auto-tag'},'auto')),
        h('span',{className:'amount'}, gS(amount), pct>0 && h('span',{className:'pct'},` ${pct}%`))
      ),
      // mini progress bar showing pct of income (visual cue without text)
      pct > 0 && !expanded && h('div',{className:'mini-bar'}, h('div',{style:{width:Math.min(100,pct*2.5)+'%'}})),
      expanded && h('div',{className:'body'},
        pot.note && h('p',{className:'note'}, pot.note),
        isAuto && h('div',{className:'auto-info'}, autoLabel),
        pot.kind==='fixed' && h('div',{className:'row'},
          h('span',null,'Monthly'),
          h('span',{className:'mw'}, h('input',{type:'number',step:'0.01',value:pot.amount||0,className:'amt-input',onChange:e=>update({amount:+e.target.value}),onFocus:e=>e.target.select()})),
          h('span',{className:'muted',style:{fontSize:12,marginLeft:8}},'stays until you change it')
        ),
        pot.kind==='list' && h('div',null,
          h('div',{className:'items'},
            (pot.items||[]).map(it=>{
              const eff = itemEffectiveAmount(it, year, monthIdx);
              const futureChanges = (it.changes||[]).filter(c => new Date(c.effectiveFrom) > new Date(year, monthIdx, 1));
              const hasChanges = (it.changes||[]).length > 0;
              return h('div',{key:it.id,className:'item-row'},
                h('input',{className:'item-name',value:it.name,onChange:e=>updateItemName(it.id,e.target.value),onFocus:e=>e.target.select()}),
                hasChanges && h('span',{
                  className:'item-changes',
                  title: 'Scheduled:\n' + (it.changes||[]).map(c=>`${fmtMon(c.effectiveFrom)}: ${g2(c.amount)}${c.note?' \u2014 '+c.note:''}`).join('\n') + '\n\nClick to clear.',
                  onClick:()=>setConfirmClearChanges(it)
                }, futureChanges.length > 0 ? `\ud83d\udcc5+${futureChanges.length}` : '\ud83d\udcc5'),
                h('span',{className:'mw'}, h('input',{type:'number',step:'0.01',value:eff,className:'amt-input',onChange:e=>updateItemAmount(it.id,+e.target.value),onFocus:e=>e.target.select()})),
                h('button',{className:'del',onClick:()=>delItem(it.id),title:'Remove'},'\u00d7')
              );
            })
          ),
          h('div',{className:'add-item'},
            h('button',{className:'smbtn',onClick:addItem},'+ Add item')
          )
        ),
        pot.kind==='auto-annual' && h('div',{className:'muted',style:{fontSize:12,marginTop:8}},
          ctx.annual.filter(e=>e.pay_month===monthIdx).map(e=>h('div',{key:e.id},`\u2022 ${e.name} \u2014 ${g2(e.amount)}`))
        ),
        pot.kind==='auto-birthdays' && h('div',{className:'muted',style:{fontSize:12,marginTop:8}},
          (function(){
            const start = new Date(ctx.payday); start.setDate(start.getDate()+7);
            const end = new Date(ctx.nextPayday); end.setDate(end.getDate()+7);
            const yr = start.getFullYear();
            const matches = ctx.birthdays.filter(b=>{
              for(const y of [yr, yr+1]){
                const bd = new Date(y, (b.month||1)-1, b.day||1);
                if(bd >= start && bd < end) return true;
              }
              return false;
            });
            return matches.length===0 ? h('div',null,'No birthdays in this period')
              : matches.map(b=>h('div',{key:b.id},`\u2022 ${b.name} \u2014 ${g2(b.amount)}`));
          })()
        ),
        h('hr',{className:'sep'}),
        h('div',{className:'row',style:{gap:6}},
          h('span',{style:{fontSize:12,color:'var(--muted)'}},'Note:'),
          h('input',{type:'text',value:pot.note||'',placeholder:'Optional',onChange:e=>update({note:e.target.value}),style:{flex:1}})
        ),
        h('div',{className:'row',style:{gap:6,marginTop:8}},
          h('input',{type:'text',value:pot.name,onChange:e=>update({name:e.target.value}),style:{flex:1}}),
          h('input',{type:'text',value:pot.emoji,onChange:e=>update({emoji:e.target.value}),style:{width:46,textAlign:'center',fontSize:18}})
        ),
        h('div',{className:'actions'},
          h('button',{className:'smbtn',disabled:isFirst,onClick:onMoveUp,style:{opacity:isFirst?0.4:1}},'\u25b2'),
          h('button',{className:'smbtn',disabled:isLast,onClick:onMoveDown,style:{opacity:isLast?0.4:1}},'\u25bc'),
          h('span',{style:{flex:1}}),
          h('button',{className:'smbtn danger',onClick:()=>setConfirmDel(true)},'\ud83d\uddd1\ufe0f')
        )
      )
    )
  );
}

/* ============ BUDGET INSIGHTS ============ */
function buildBudgetInsights({ ctx, income, buffer, annual, birthdays, payday, nextPayday }){
  const list = [];
  if(ctx.weekends >= 5){
    list.push({ type:'warn', ico:'\ud83d\udecd\ufe0f', text:`5 Saturdays this period — shopping pot is higher than usual.` });
  }
  if(buffer < 0){
    list.push({ type:'alert', ico:'\u26a0\ufe0f', text:`Shortfall of ${g2(Math.abs(buffer))}. Reduce a flexible pot.` });
  } else if(buffer < income*0.03){
    list.push({ type:'warn', ico:'\u26a0\ufe0f', text:`Buffer is tight (${g2(buffer)} = ${Math.round((buffer/income)*100)}% of income).` });
  } else if(buffer > income*0.15){
    list.push({ type:'good', ico:'\ud83d\udcb8', text:`Healthy buffer of ${g2(buffer)} — room for fun, savings boosts, or surprises.` });
  }
  const calThisMonth = annual.filter(e=>e.pay_month===payday.getMonth()).reduce((s,e)=>s+(+e.amount||0),0);
  if(calThisMonth >= 300){
    list.push({ type:'warn', ico:'\ud83d\udcc5', text:`Heavy calendar month: ${g2(calThisMonth)} in scheduled annual costs.` });
  }
  const start = new Date(payday); start.setDate(start.getDate()+7);
  const end = new Date(nextPayday); end.setDate(end.getDate()+7);
  const yr = start.getFullYear();
  const upcomingBdays = birthdays.filter(b=>{
    for(const y of [yr, yr+1]){
      const bd = new Date(y, (b.month||1)-1, b.day||1);
      if(bd >= start && bd < end) return true;
    }
    return false;
  });
  if(upcomingBdays.length > 0){
    list.push({ type:'tip', ico:'\ud83c\udf81', text:`Birthdays this period: ${upcomingBdays.map(b=>b.name).join(', ')}.` });
  }
  const nm = payday.getMonth();
  for(let i=1;i<=3;i++){
    const m = (nm+i)%12;
    const cal = annual.filter(e=>e.pay_month===m).reduce((s,e)=>s+(+e.amount||0),0);
    if(cal >= 200){
      list.push({ type:'tip', ico:'\ud83d\udd2d', text:`Heads up: ${MONTH_NAMES[m]} has ${g2(cal)} in calendar costs coming up.` });
      break;
    }
  }
  return list;
}

/* ============ ENERGY VIEW ============ */
function EnergyView({ tariff, setTariff, account, setAccount, readings, setReadings, pots, setPots, marketScan, setMarketScan }){
  const [type, setType] = useState('elec');
  const [date, setDate] = useState(new Date().toISOString().slice(0,10));
  const [value, setValue] = useState('');
  const [editTariff, setEditTariff] = useState(false);
  const [chartMode, setChartMode] = useState('monthly');
  const [historicView, setHistoricView] = useState(false);
  const [syncDismissed, setSyncDismissed] = useState(false);
  const [confirmReset, setConfirmReset] = useState(false);

  // Filter readings to recent (last 18mo) unless historic toggle on
  const cutoff = new Date(); cutoff.setMonth(cutoff.getMonth()-18);
  const visibleReadings = historicView ? readings : readings.filter(r => new Date(r.date) >= cutoff);

  const insights = useMemo(()=>computeEnergyInsights(visibleReadings, tariff, account), [visibleReadings, tariff, account]);
  const monthlySeries = useMemo(()=>buildMonthlyCostSeries(visibleReadings, tariff), [visibleReadings, tariff]);
  const rawSeries = useMemo(()=>buildAllReadingSeries(visibleReadings), [visibleReadings]);

  const billsPot = pots.find(p=>p.kind==='list' && /bill/i.test(p.name));
  const energyItem = billsPot && billsPot.items && billsPot.items.find(i=>/energy|gas|electric/i.test(i.name));

  const today = new Date();
  const defaultSyncDate = new Date(today.getFullYear(), today.getMonth()+1, 1).toISOString().slice(0,10);
  const [syncDate, setSyncDate] = useState(defaultSyncDate);

  const ddMismatch = energyItem && Math.abs(itemEffectiveAmount(energyItem, today.getFullYear(), today.getMonth()+1) - account.monthlyDD) > 0.5;
  const showSyncBanner = ddMismatch && !syncDismissed;

  const insightsList = useMemo(()=>buildEnergyInsightsList(insights, tariff, account, energyItem, marketScan), [insights, tariff, account, energyItem, marketScan]);

  // Daily market scan check
  useEffect(()=>{
    const now = Date.now();
    const lastScan = marketScan?.lastScan ? new Date(marketScan.lastScan).getTime() : 0;
    const oneDayMs = 24*60*60*1000;
    if(now - lastScan > oneDayMs){
      // Simulate scan: check if our current rates beat MSE typical fixed deals
      // MSE typical Apr 2026 fixes are around 18-22p elec, 5-7p gas
      // Our rates: 20.68p elec, 6.21p gas — competitive but not the absolute cheapest
      const elecCompetitive = tariff.elec.unitRate <= 20;
      const gasCompetitive = tariff.gas.unitRate <= 6;
      const cheaperFound = !elecCompetitive || !gasCompetitive;
      setMarketScan({
        checked: true,
        cheaperFound,
        lastScan: new Date().toISOString(),
        daysAgo: 0,
        notes: cheaperFound ? 'Better fixed-rate deals may be available' : 'Your rates look competitive'
      });
    } else if(marketScan){
      // Update daysAgo
      const days = Math.floor((now - lastScan) / oneDayMs);
      if(days !== marketScan.daysAgo){
        setMarketScan({ ...marketScan, daysAgo: days });
      }
    }
  }, [tariff.elec.unitRate, tariff.gas.unitRate]);

  function syncDDToBills(){
    if(!billsPot || !energyItem || !syncDate) return;
    const newPots = pots.map(p => p.id !== billsPot.id ? p : {
      ...p,
      items: p.items.map(i => i.id !== energyItem.id ? i : scheduleItemChange(i, syncDate, account.monthlyDD, 'DD update'))
    });
    setPots(newPots);
    setSyncDismissed(true);
  }

  function applyDDSuggestion(newDD){
    setAccount({ ...account, monthlyDD: newDD });
    setSyncDismissed(false);
  }

  function addReading(){
    const v = parseFloat(value);
    if(!v || !date){ alert('Enter a date and a meter reading'); return; }
    const sameType = readings.filter(r=>r.type===type).sort((a,b)=>new Date(b.date)-new Date(a.date));
    const newer = sameType.filter(r=>new Date(r.date) <= new Date(date));
    if(newer[0] && v < newer[0].value){
      if(!confirm(`Reading ${v} is lower than ${newer[0].value} on ${fmtDate(newer[0].date)}. Save anyway?`)) return;
    }
    setReadings([...readings, { id:newId(), type, date, value:v, source:'manual' }]);
    setValue('');
  }

  function delReading(id){
    if(confirm('Delete this reading?')) setReadings(readings.filter(r=>r.id!==id));
  }

  const monthOpts = [];
  for(let i=0; i<18; i++){
    const d = new Date(today.getFullYear(), today.getMonth()+i, 1);
    monthOpts.push({ val: d.toISOString().slice(0,10), label: fmtMon(d) });
  }

  const sortedReadings = readings.slice().sort((a,b)=>new Date(b.date)-new Date(a.date));

/* ============ RENEWALS VIEW ============ */
function RenewalsView({ renewals, setRenewals, tariff, setActiveView }){
  const [editingId, setEditingId] = useState(null);
  const [adding, setAdding] = useState(false);
  const [draft, setDraft] = useState({ type:'insurance', name:'', provider:'', endDate:'', monthlyCost:0, annualCost:0, exitFee:0, notes:'' });
  const [confirmDelId, setConfirmDelId] = useState(null);
  const today = new Date();

  const energySynth = {
    id:'syn-energy', type:'energy', name:tariff.name || 'Energy tariff', provider:'EDF Energy',
    endDate: tariff.endDate, monthlyCost: 127.09, annualCost: 127.09*12,
    exitFee: tariff.exitFeeTotal || 100, notes:'Edit in Energy tab', synthetic:true
  };
  const all = [energySynth, ...renewals].sort((a,b)=> new Date(a.endDate) - new Date(b.endDate));

  function urgencyClass(days){
    if(days < 0) return 'past';
    if(days < 30) return 'alert';
    if(days < 90) return 'warn';
    return 'calm';
  }
  function urgencyText(days){
    if(days < 0) return `${Math.abs(days)}d ago`;
    if(days === 0) return 'Today';
    if(days < 365) return `${days}d left`;
    return `${Math.round(days/30)}mo`;
  }
  function startEdit(r){ setEditingId(r.id); setAdding(false); setDraft({ ...r }); }
  function cancelEdit(){ setEditingId(null); setAdding(false); }
  function saveEdit(){
    if(!draft.name || !draft.endDate){ alert('Name and end date required'); return; }
    if(adding){
      setRenewals([...renewals, { ...draft, id:newId() }]);
    } else {
      setRenewals(renewals.map(r => r.id === editingId ? { ...draft, id:r.id } : r));
    }
    setEditingId(null); setAdding(false);
  }
  function startAdd(){
    setAdding(true); setEditingId(null);
    const nextYear = new Date(); nextYear.setFullYear(nextYear.getFullYear()+1);
    setDraft({ type:'insurance', name:'', provider:'', endDate:nextYear.toISOString().slice(0,10), monthlyCost:0, annualCost:0, exitFee:0, notes:'' });
  }

  const insightsList = [];
  const expiring30 = all.filter(r=>{ const d=dDay(today,r.endDate); return d>=0 && d<=30; });
  const expiring90 = all.filter(r=>{ const d=dDay(today,r.endDate); return d>=0 && d<=90; });
  const expired = all.filter(r=>dDay(today,r.endDate) < 0);
  if(expired.length > 0) insightsList.push({ type:'alert', ico:'\u26a0\ufe0f', text:`${expired.length} renewal${expired.length>1?'s have':' has'} already passed.` });
  if(expiring30.length > 0) insightsList.push({ type:'warn', ico:'\u23f0', text:`${expiring30.length} renewal${expiring30.length>1?'s':''} expiring within 30 days.` });
  if(expiring90.length > 0 && expiring30.length === 0) insightsList.push({ type:'tip', ico:'\ud83d\udcc5', text:`${expiring90.length} renewal${expiring90.length>1?'s':''} expiring within 90 days.` });
  const totalAnnual = all.reduce((s,r)=>s+(+r.annualCost||0),0);
  if(totalAnnual > 0) insightsList.push({ type:'tip', ico:'\ud83d\udcb0', text:`Total tracked: ${g2(totalAnnual)}/year across ${all.length} contract${all.length>1?'s':''}.` });

  const delTarget = confirmDelId ? renewals.find(r=>r.id===confirmDelId) : null;

  return h('div', null,
    delTarget && h(ConfirmModal,{
      title:'Delete renewal?', ico:'\ud83d\uddd1\ufe0f', danger:true,
      message:`Remove "${delTarget.name}" from your tracked renewals?`,
      confirmLabel:'Delete',
      onConfirm:()=>{ setRenewals(renewals.filter(r=>r.id!==confirmDelId)); setConfirmDelId(null); },
      onCancel:()=>setConfirmDelId(null)
    }),

    insightsList.length > 0 && h('div',{className:'insights'},
      insightsList.map((ins,i)=>h('div',{key:i,className:'ins '+ins.type},
        h('span',{className:'ico'},ins.ico), h('div',{className:'body'}, ins.text)
      ))
    ),

    h('div',{className:'spaced',style:{marginBottom:12}},
      h('h2',{style:{margin:0,fontSize:16}},'\ud83d\udcc4 Tracked contracts'),
      !adding && !editingId && h('button',{className:'smbtn primary',onClick:startAdd},'+ Add')
    ),

    (adding || editingId) && h('div',{className:'ren-form'},
      h('label',null,h('div',{className:'muted',style:{fontSize:11,marginBottom:3}},'Type'),
        h('select',{value:draft.type,onChange:e=>setDraft({...draft,type:e.target.value}),style:{width:'100%'}},
          RENEWAL_TYPES.map(t=>h('option',{key:t.id,value:t.id},t.label))
        )
      ),
      h('label',null,h('div',{className:'muted',style:{fontSize:11,marginBottom:3}},'Name'),
        h('input',{value:draft.name,onChange:e=>setDraft({...draft,name:e.target.value}),placeholder:'e.g. Car insurance',style:{width:'100%'}})
      ),
      h('label',null,h('div',{className:'muted',style:{fontSize:11,marginBottom:3}},'Provider'),
        h('input',{value:draft.provider,onChange:e=>setDraft({...draft,provider:e.target.value}),placeholder:'e.g. Aviva',style:{width:'100%'}})
      ),
      h('label',null,h('div',{className:'muted',style:{fontSize:11,marginBottom:3}},'End date'),
        h('input',{type:'date',value:draft.endDate,onChange:e=>setDraft({...draft,endDate:e.target.value}),style:{width:'100%'}})
      ),
      h('label',null,h('div',{className:'muted',style:{fontSize:11,marginBottom:3}},'Annual £'),
        h('span',{className:'mw'},h('input',{type:'number',step:'0.01',value:draft.annualCost,onChange:e=>setDraft({...draft,annualCost:+e.target.value,monthlyCost:+e.target.value/12}),style:{width:'100%'}}))
      ),
      h('div',{style:{display:'flex',gap:6}},
        h('button',{className:'smbtn primary',onClick:saveEdit},'Save'),
        h('button',{className:'smbtn',onClick:cancelEdit},'Cancel')
      )
    ),

    all.length === 0 && !adding && h('div',{className:'empty'},
      h('div',{className:'big'},'\ud83d\udd04'),
      h('div',null,'No renewals tracked yet.'),
      h('div',{style:{marginTop:8}}, h('button',{className:'smbtn primary',onClick:startAdd},'Add first renewal'))
    ),

    all.map(r => {
      const days = dDay(today, r.endDate);
      const cls = urgencyClass(days);
      return h('div',{key:r.id,className:'ren-row'},
        h('span',{className:'ico'}, RENEWAL_ICONS[r.type] || '\ud83d\udcc4'),
        h('div',null,
          h('div',{className:'name'}, r.name, r.synthetic && h('span',{className:'auto-tag',style:{marginLeft:8}},'synced')),
          h('div',{className:'meta'},
            r.provider && r.provider !== 'TBD' ? `${r.provider} \u2022 ` : '',
            `${fmtDate(r.endDate)}`,
            r.annualCost > 0 ? ` \u2022 ${g2(r.annualCost)}/yr` : ''
          )
        ),
        h('span',{className:'urgency '+cls}, urgencyText(days)),
        h('div',{className:'actions'},
          r.synthetic
            ? h('button',{className:'smbtn',onClick:()=>setActiveView('energy')},'Edit')
            : h(Fragment, null,
                h('button',{className:'smbtn',onClick:()=>startEdit(r)},'Edit'),
                h('button',{className:'smbtn danger',onClick:()=>setConfirmDelId(r.id)},'\u00d7')
              )
        )
      );
    })
  );
}

/* ============ MORTGAGE VIEW ============ */
function MortgageView({ settings, setSettings }){
  const [overpay, setOverpay] = useState(0);
  const today = new Date();
  const renewal = new Date(2028, 0, 1);
  const monthsUntil = Math.max(0, (renewal.getFullYear()-today.getFullYear())*12 + (renewal.getMonth()-today.getMonth()));
  const monthlyRate = (settings.mortRate||0) / 100 / 12;

  function projectBalance(startBalance, payment, months){
    let bal = startBalance;
    for(let i=0; i<months && bal > 0; i++){
      const interest = bal * monthlyRate;
      bal = Math.max(0, bal - (payment - interest));
    }
    return bal;
  }
  function pmt(p, r, n){ const m=r/100/12; return n>0 && m>0 ? p*m/(1-Math.pow(1+m,-n)) : 0; }
  function monthsToZero(startBalance, payment){
    let bal = startBalance, m = 0;
    while(bal > 0 && m < 600){
      const interest = bal * monthlyRate;
      const principal = payment - interest;
      if(principal <= 0) return Infinity;
      bal -= principal; m++;
    }
    return m;
  }

  const baseProjBal = projectBalance(settings.mortBalance, settings.mortPmt, monthsUntil);
  const overpayProjBal = projectBalance(settings.mortBalance, settings.mortPmt + overpay, monthsUntil);
  const baseMonthsToZero = monthsToZero(settings.mortBalance, settings.mortPmt);
  const overpayMonthsToZero = monthsToZero(settings.mortBalance, settings.mortPmt + overpay);
  const monthsSaved = baseMonthsToZero - overpayMonthsToZero;
  const interestSaved = (baseMonthsToZero * settings.mortPmt) - (overpayMonthsToZero * (settings.mortPmt + overpay));
  const remainingMonthsAfterRenewal = 361 - monthsUntil;
  const rates = [3.25, 3.75, 4.25, 4.75, 5.50];
  const propertyValue = 439000;
  const equity = propertyValue - settings.mortBalance;
  const equityPct = (equity / propertyValue * 100).toFixed(1);

  return h('div', null,
    h('div',{className:'en-grid'},
      h('div',{className:'en-stat'},
        h('div',{className:'lbl'},'\ud83d\udcb7 Balance'),
        h('div',{className:'val'}, g0(settings.mortBalance)),
        h('div',{className:'sub'}, `${settings.mortRate}% \u2022 ${g2(settings.mortPmt)}/mo`)
      ),
      h('div',{className:'en-stat good'},
        h('div',{className:'lbl'},'\ud83c\udfe1 Equity'),
        h('div',{className:'val'}, g0(equity)),
        h('div',{className:'sub'}, `${equityPct}% of ${g0(propertyValue)}`)
      ),
      h('div',{className:'en-stat'},
        h('div',{className:'lbl'},'\u23f3 Renewal'),
        h('div',{className:'val'}, `${monthsUntil}mo`),
        h('div',{className:'sub'}, `Jan 2028 \u2022 proj ${g0(baseProjBal)}`)
      )
    ),

    h('div',{className:'section'},
      h('h2',null,'\u2699\ufe0f Settings'),
      h('div',{style:{display:'grid',gridTemplateColumns:'1fr 1fr 1fr',gap:12}},
        h('label',null,h('div',{className:'muted',style:{fontSize:12,marginBottom:4}},'Balance'),h('span',{className:'mw',style:{display:'block'}},h('input',{type:'number',step:'1',value:settings.mortBalance,onChange:e=>setSettings({...settings,mortBalance:+e.target.value}),style:{width:'100%'}}))),
        h('label',null,h('div',{className:'muted',style:{fontSize:12,marginBottom:4}},'Rate (%)'),h('input',{type:'number',step:'0.01',value:settings.mortRate,onChange:e=>setSettings({...settings,mortRate:+e.target.value}),style:{width:'100%'}})),
        h('label',null,h('div',{className:'muted',style:{fontSize:12,marginBottom:4}},'Monthly'),h('span',{className:'mw',style:{display:'block'}},h('input',{type:'number',step:'0.01',value:settings.mortPmt,onChange:e=>setSettings({...settings,mortPmt:+e.target.value}),style:{width:'100%'}})))
      )
    ),

    h('div',{className:'section'},
      h('h2',null,'\ud83d\udcc8 Overpayment scenario'),
      h('div',{style:{marginBottom:12}},

function GoalsView({ pots, setPots }){
  const today = new Date();
  const billsPot = pots.find(p=>/bill/i.test(p.name));
  const potGoals = pots.filter(p => p.isGoal && p.kind === 'fixed');
  const savingsItems = ((billsPot?.items)||[]).filter(i => /savings|christmas|holiday|emergency/i.test(i.name));

  function updatePotGoal(potId, patch){
    setPots(pots.map(p => p.id === potId ? { ...p, ...patch } : p));
  }

  function GoalRow({ name, monthly, target, targetDate, current, ico, onUpdate }){
    const monthsTo = targetDate ? Math.max(0, dDay(today, targetDate) / 30) : 0;
    const projectedAtTarget = (current||0) + monthly * monthsTo;
    const onTrack = !target || projectedAtTarget >= target;
    const pct = target > 0 ? Math.min(100, ((current||0)/target)*100) : 0;
    const monthsToHit = monthly > 0 && target > current ? (target - current) / monthly : 0;
    const projectedHitDate = monthly > 0 ? new Date(today.getTime() + monthsToHit*30*86400000) : null;

    return h('div',{className:'goal'},
      h('div',{className:'gh'},

          target > 0 ? ` of ${g0(target)}` : ` /mo`
        )
      ),
      target > 0 && h('div',{className:'bar'}, h('div',{className:onTrack?'good':'',style:{width:pct.toFixed(1)+'%'}})),
      target > 0 && h('div',{className:'gmeta'},
        h('span',null, `${pct.toFixed(0)}% \u2022 ${g2(monthly)}/mo`),
        targetDate ? h('span',null, onTrack ? `\u2705 on track for ${fmtMon(targetDate)}` : `\u26a0\ufe0f short \u2014 needs ${g2((target-projectedAtTarget)/monthsTo)}/mo more`)

/* ============ AFFORD CHECKER ============ */
function AffordChecker({ buffer, pots, ctx }){
  const [item, setItem] = useState('');
  const [cost, setCost] = useState('');
  const [open, setOpen] = useState(false);
  const c = parseFloat(cost) || 0;
  const result = (() => {
    if(!c) return null;
    if(c <= buffer) return { ok:true, msg:`Yes \u2014 covered by buffer (${g2(buffer-c)} left).` };
    if(c <= buffer*2){ const half = c/2; return { ok:'maybe', msg:`Yes if split across 2 months (${g2(half)} each).` }; }
    const flex = pots.filter(p=>p.kind==='fixed' && /fun|misc|maint|days/i.test(p.name) && potAmount(p,ctx) > 0);
    const flexTotal = flex.reduce((s,p)=>s+potAmount(p,ctx),0);
    if(c <= buffer + flexTotal) return { ok:'maybe', msg:`Possible by reducing flexible pots by ${g2(c-buffer)}.` };
    return { ok:false, msg:`Not without cutting essentials. ${g2(c-buffer)} short.` };
  })();
  return h('div',{className:'section'},
    h('div',{className:'spaced'},
      h('h2',{style:{margin:0}},'\ud83e\udd14 Can I afford it?'),
      h('button',{className:'smbtn',onClick:()=>setOpen(!open)}, open?'Hide':'Open')
    ),
    open && h('div',{className:'checker'},
      h('div',{className:'row',style:{gap:8}},
        h('input',{placeholder:'What is it?',value:item,onChange:e=>setItem(e.target.value),style:{flex:2}}),
        h('span',{className:'mw'}, h('input',{type:'number',step:'0.01',placeholder:'Cost',value:cost,onChange:e=>setCost(e.target.value),className:'amt-input',style:{flex:1}}))
      ),
      result && h('div',{className:'out'},
        h('span',{style:{fontSize:18,marginRight:6}}, result.ok===true ? '\u2705' : result.ok==='maybe' ? '\ud83e\udd14' : '\u274c'),
        result.msg
      )
    )
  );
}

/* ============ MAGIC ALLOCATE ============ */
// Auto-allocate: best guess at fresh budget setup for the period
function magicAllocate(pots, ctx, settings){
  // Strategy: leave list/auto pots untouched (their amounts come from items/calc).
  // For fixed pots, set sensible defaults based on pot name.
  const defaults = {
    'petrol': 170,
    'days out': 200,
    'misc': 100,
    'car maintenance': 100,
    'house maintenance': 100,
    "lauren's 40th": 80,
    'fun': 200
  };
  const updated = pots.map(p => {
    if(p.kind !== 'fixed') return p;
    const key = p.name.toLowerCase();
    let suggestion = null;
    for(const [pat, val] of Object.entries(defaults)){
      if(key.includes(pat)){ suggestion = val; break; }
    }
    if(suggestion === null) return p; // unknown pot, leave alone
    return { ...p, amount: suggestion };
  });
  return updated;
}

function buildAllocatePreview(currentPots, newPots, ctx){
  const rows = [];
  newPots.forEach((np, i) => {
    const cp = currentPots[i];
    if(np.kind !== 'fixed') return;
    const before = cp.amount || 0;
    const after = np.amount || 0;
    if(before !== after){
      rows.push({ label: `${np.emoji} ${np.name}`, value: `${g2(before)} \u2192 ${g2(after)}` });
    }
  });
  return rows;
}

/* ============ BUDGET VIEW ============ */
function BudgetView({ year, monthIdx, setYear, setMonthIdx, settings, setSettings, pots, setPots, annual, setAnnual, birthdays, setBirthdays }){
  const ctx = useMemo(()=>buildPeriodCtx({ year, monthIdx, settings, birthdays, annual }), [year, monthIdx, settings, birthdays, annual]);
  const totals = useMemo(()=>pots.map(p=>potAmount(p, ctx)), [pots, ctx]);
  const totalAllocated = totals.reduce((s,n)=>s+n, 0);
  const buffer = settings.income - totalAllocated;
  const bufferPct = settings.income > 0 ? (buffer/settings.income)*100 : 0;
  const health = buffer < 0 ? 'bad' : bufferPct < 3 ? 'warn' : bufferPct < 8 ? 'warn' : 'good';
  const healthLabel = buffer < 0 ? 'Shortfall' : bufferPct < 3 ? 'At risk' : bufferPct < 8 ? 'Thin' : 'Healthy';
  const insightsList = useMemo(()=>buildBudgetInsights({ ctx, income:settings.income, buffer, annual, birthdays, payday:ctx.payday, nextPayday:ctx.nextPayday }), [ctx, settings, buffer, annual, birthdays]);

  const [confirmMagic, setConfirmMagic] = useState(false);
  const [magicPreview, setMagicPreview] = useState(null);

  function updatePot(idx, newPot){ setPots(pots.map((p,i)=> i===idx ? newPot : p)); }
  function delPot(idx){ setPots(pots.filter((_,i)=>i!==idx)); }
  function movePot(idx, dir){
    const j = idx + dir;
    if(j<0 || j>=pots.length) return;
    const a = pots.slice(); [a[idx], a[j]] = [a[j], a[idx]]; setPots(a);
  }
  function addPot(){ setPots([...pots, { id:'pot-'+newId(), name:'New pot', emoji:'\ud83d\udcb0', kind:'fixed', amount:0 }]); }

  function startMagic(){
    const newPots = magicAllocate(pots, ctx, settings);
    const preview = buildAllocatePreview(pots, newPots, ctx);
    setMagicPreview({ newPots, preview });
    setConfirmMagic(true);
  }
  function applyMagic(){
    if(magicPreview) setPots(magicPreview.newPots);
    setConfirmMagic(false);
    setMagicPreview(null);
  }

  return h('div', null,
    confirmMagic && magicPreview && h(ConfirmModal,{
      title:'Magic allocate?', ico:'\u2728',
      message: magicPreview.preview.length === 0
        ? 'Your fixed pots already match the suggested defaults — nothing would change.'
        : `This will overwrite the amounts in ${magicPreview.preview.length} fixed pot${magicPreview.preview.length>1?'s':''} with sensible defaults. Auto and list pots are untouched. Existing values will be lost.`,
      preview: magicPreview.preview,
      confirmLabel: magicPreview.preview.length === 0 ? 'OK' : 'Apply',
      danger: magicPreview.preview.length > 0,
      onConfirm: applyMagic,
      onCancel: ()=>{ setConfirmMagic(false); setMagicPreview(null); }
    }),

    h('div',{className:'period'},
      h('select',{value:monthIdx,onChange:e=>setMonthIdx(+e.target.value)}, MONTH_NAMES.map((n,i)=>h('option',{key:i,value:i},n))),
      h('select',{value:year,onChange:e=>setYear(+e.target.value)}, [2025,2026,2027,2028].map(y=>h('option',{key:y,value:y},y))),
      h('span',{className:'pill'}, '\ud83d\udcc6 ', fmtShort(ctx.payday)),
      h('span',{className:'pill'}, `${ctx.weekends}\u00d7\ud83d\udecd \u2022 ${ctx.fridays}\u00d7\ud83c\udf92`),
      h('button',{className:'magic-btn',onClick:startMagic,title:'Best-guess auto-allocation for this month'},
        '\u2728 Magic allocate'
      )
    ),

    h('div',{className:'summary'},
      h('div',{className:'item'},
        h('div',{className:'lbl'},'\ud83d\udcb5 Income'),
        h('div',{className:'val'}, g2(settings.income)),
        h('div',{className:'sub'}, h('span',{className:'mw'}, h('input',{type:'number',step:'0.01',value:settings.income,onChange:e=>setSettings({...settings,income:+e.target.value}),className:'amt-input',style:{width:110}})))
      ),
      h('div',{className:'item'},
        h('div',{className:'lbl'},'\ud83d\udcca Allocated'),
        h('div',{className:'val'}, g2(totalAllocated)),
        h('div',{className:'sub'}, `${pots.length} pots \u2022 ${settings.income>0?Math.round((totalAllocated/settings.income)*100):0}%`)
      ),
      h('div',{className:'item'},
        h('div',{className:'lbl'},'\ud83d\udcb8 Buffer'),
        h('div',{className:'val', style:{color: buffer<0 ? 'var(--bad)' : 'inherit'}}, g2(buffer)),
        h('div',{className:'sub'},
          h('span',{className:'health '+health}, healthLabel),
          h('span',null,` \u2022 ${bufferPct.toFixed(1)}%`)
        )
      )
    ),

    insightsList.length > 0 && h('div',{className:'insights'},
      insightsList.map((ins,i) => h('div',{key:i,className:'ins '+ins.type},
        h('span',{className:'ico'}, ins.ico), h('div',{className:'body'}, ins.text)
      ))
    ),

    h('div',{className:'pots'},
      pots.map((p,i)=>h(PotCard,{
        key:p.id, pot:p, ctx, settings, income:settings.income,
        onChange:(np)=>updatePot(i,np),
        onDelete:()=>delPot(i),
        onMoveUp:()=>movePot(i,-1),
        onMoveDown:()=>movePot(i,1),
        isFirst:i===0, isLast:i===pots.length-1
      }))
    ),
    h('div',{style:{marginBottom:16}},
      h('button',{className:'smbtn',onClick:addPot},'+ Add pot')
    ),

    h(AffordChecker,{ buffer, pots, ctx }),
    h(AnnualSection,{ annual, setAnnual }),
    h(BirthdaysSection,{ birthdays, setBirthdays })
  );
}

/* ============ APP ============ */
function App(){
  const [authed, setAuthed] = useState(()=> localStorage.getItem('pp:auth') === '1');
  const [pw, setPw] = useState('');
  const [pwErr, setPwErr] = useState('');

  const today = new Date();
  const [year, setYear] = useState(today.getFullYear());
  const [monthIdx, setMonthIdx] = useState(today.getMonth());

  const [activeView, setActiveView] = useState('budget');
  const [dark, setDark] = useState(()=> localStorage.getItem('pp:dark') === '1');
  const [confirmReset, setConfirmReset] = useState(false);

  const [settings, setSettings] = useState(DEFAULT_SETTINGS);
  const [pots, setPots] = useState(DEFAULT_POTS);
  const [annual, setAnnual] = useState(DEFAULT_ANNUAL);
  const [birthdays, setBirthdays] = useState(DEFAULT_BIRTHDAYS);
  const [tariff, setTariff] = useState(DEFAULT_TARIFF);
  const [enAccount, setEnAccount] = useState(DEFAULT_EN_ACCOUNT);
  const [readings, setReadings] = useState(DEFAULT_READINGS);
  const [renewals, setRenewals] = useState(DEFAULT_RENEWALS);
  const [marketScan, setMarketScan] = useState(null);
  const [loaded, setLoaded] = useState(false);
  const [saved, setSaved] = useState(false);
  const saveTimer = useRef(null);

  useEffect(()=>{
    if(!authed) return;
    (async ()=>{
      const [s, p, a, b, t, ac, r, rn, ms] = await Promise.all([
        loadKey('pp:settings', DEFAULT_SETTINGS),
        loadKey('pp:pots', DEFAULT_POTS),
        loadKey('pp:annual', DEFAULT_ANNUAL),
        loadKey('pp:birthdays', DEFAULT_BIRTHDAYS),
        loadKey('pp:energy_tariff', DEFAULT_TARIFF),
        loadKey('pp:energy_account', DEFAULT_EN_ACCOUNT),
        loadKey('pp:energy_readings', DEFAULT_READINGS),
        loadKey('pp:renewals', DEFAULT_RENEWALS),
        loadKey('pp:market_scan', null)
      ]);
      setSettings(s); setPots(p); setAnnual(a); setBirthdays(b);
      setTariff(t); setEnAccount(ac); setReadings(r); setRenewals(rn);
      setMarketScan(ms);
      setLoaded(true);
    })();
  }, [authed]);

  function flashSaved(){
    setSaved(true);
    clearTimeout(saveTimer.current);
    saveTimer.current = setTimeout(()=>setSaved(false), 1200);
  }
  useEffect(()=>{ if(loaded) saveKey('pp:settings', settings).then(flashSaved); }, [settings, loaded]);
  useEffect(()=>{ if(loaded) saveKey('pp:pots', pots).then(flashSaved); }, [pots, loaded]);
  useEffect(()=>{ if(loaded) saveKey('pp:annual', annual).then(flashSaved); }, [annual, loaded]);
  useEffect(()=>{ if(loaded) saveKey('pp:birthdays', birthdays).then(flashSaved); }, [birthdays, loaded]);
  useEffect(()=>{ if(loaded) saveKey('pp:energy_tariff', tariff).then(flashSaved); }, [tariff, loaded]);
  useEffect(()=>{ if(loaded) saveKey('pp:energy_account', enAccount).then(flashSaved); }, [enAccount, loaded]);
  useEffect(()=>{ if(loaded) saveKey('pp:energy_readings', readings).then(flashSaved); }, [readings, loaded]);
  useEffect(()=>{ if(loaded) saveKey('pp:renewals', renewals).then(flashSaved); }, [renewals, loaded]);
  useEffect(()=>{ if(loaded && marketScan) saveKey('pp:market_scan', marketScan); }, [marketScan, loaded]);

  useEffect(()=>{
    document.body.classList.toggle('dark', dark);
    localStorage.setItem('pp:dark', dark ? '1' : '0');
  }, [dark]);

  function tryLogin(){
    if(pw === PASSWORD){ localStorage.setItem('pp:auth','1'); setAuthed(true); setPwErr(''); }
    else setPwErr('Incorrect password');
  }
  function logout(){ localStorage.removeItem('pp:auth'); setAuthed(false); }
  function resetAll(){
    setSettings(DEFAULT_SETTINGS); setPots(DEFAULT_POTS);
    setAnnual(DEFAULT_ANNUAL); setBirthdays(DEFAULT_BIRTHDAYS);
    setTariff(DEFAULT_TARIFF); setEnAccount(DEFAULT_EN_ACCOUNT);
    setReadings(DEFAULT_READINGS); setRenewals(DEFAULT_RENEWALS);
    setConfirmReset(false);
  }

  if(!authed){
    return h('div',{className:'login-bg'},
      h('div',{className:'login-card'},
        h('h1',null,'\ud83e\ude99 Family Money Planner'),
        h('p',null,'Calm control over where every pound goes \u2014 before payday lands.'),
        h('input',{type:'password',placeholder:'Password',value:pw,onChange:e=>setPw(e.target.value),onKeyDown:e=>e.key==='Enter'&&tryLogin()}),
        h('button',{onClick:tryLogin},'Sign in'),
        pwErr && h('div',{className:'login-error'}, pwErr)
      )
    );
  }

  const ctx = useMemo(()=>buildPeriodCtx({ year, monthIdx, settings, birthdays, annual }), [year, monthIdx, settings, birthdays, annual]);

  const primaryTabs = [
    { id:'budget', ico:'\ud83e\ude99', label:'Budget' },
    { id:'energy', ico:'\u26a1', label:'Energy' }
  ];
  const secondaryTabs = [
    { id:'renewals', ico:'\ud83d\udd04', label:'Renewals' },
    { id:'mortgage', ico:'\ud83c\udfe0', label:'Mortgage' },
    { id:'subs',     ico:'\ud83d\udcfa', label:'Subs' },
    { id:'vehicle',  ico:'\ud83d\ude97', label:'Vehicle' },
    { id:'goals',    ico:'\ud83c\udfaf', label:'Goals' }
  ];

  return h('div',{className:'app'},
    confirmReset && h(ConfirmModal,{
      title:'Reset everything?', ico:'\u26a0\ufe0f', danger:true,
      message:'This wipes ALL data: pots, bills, energy readings, tariff, renewals \u2014 everything reverts to defaults. This cannot be undone.',
      confirmLabel:'Reset all data',
      onConfirm:resetAll,
      onCancel:()=>setConfirmReset(false)
    }),

    h('div',{className:'hdr'},
      h('h1',null, h('span',{className:'logo'},'\ud83e\ude99'), 'Family Money Planner'),
      h('div',{className:'right'},
        h('span',{className:'savedpill'+(saved?' show':'')},'\u2713 Saved'),
        h('button',{className:'icobtn',title:'Toggle dark mode',onClick:()=>setDark(!dark)}, dark ? '\u2600\ufe0f' : '\ud83c\udf19'),
        h('button',{className:'icobtn',title:'Reset all',onClick:()=>setConfirmReset(true)},'\u21bb'),
        h('button',{className:'icobtn',title:'Sign out',onClick:logout},'\u2192')
      )
    ),

    h('div',{className:'tabs'},
      primaryTabs.map(t=>h('button',{
        key:t.id, className:activeView===t.id?'active':'',
        onClick:()=>setActiveView(t.id)
      }, h('span',{className:'ico'},t.ico), h('span',null,t.label)))
    ),

    h('div',{className:'subtabs'},
      secondaryTabs.map(t=>h('button',{
        key:t.id, className:activeView===t.id?'active':'',
        onClick:()=>setActiveView(t.id)
      }, h('span',null,t.ico), h('span',null,t.label)))
    ),

    activeView === 'budget' ? h(BudgetView,{ year, monthIdx, setYear, setMonthIdx, settings, setSettings, pots, setPots, annual, setAnnual, birthdays, setBirthdays })
    : activeView === 'energy' ? h(EnergyView,{ tariff, setTariff, account:enAccount, setAccount:setEnAccount, readings, setReadings, pots, setPots, marketScan, setMarketScan })
    : activeView === 'renewals' ? h(RenewalsView,{ renewals, setRenewals, tariff, setActiveView })
    : activeView === 'mortgage' ? h(MortgageView,{ settings, setSettings })
    : activeView === 'subs' ? h(SubscriptionsView,{ pots, setPots })
    : activeView === 'vehicle' ? h(VehicleView,{ pots, annual, ctx })
    : activeView === 'goals' ? h(GoalsView,{ pots, setPots })
    : null
  );
}

const root = ReactDOM.createRoot(document.getElementById('root'));
root.render(h(App));
</script>
</body>
</html>
