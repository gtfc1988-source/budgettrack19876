<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Budget Planner</title>
</head>
<body>
<div id="root"></div>
<style>
@import url('https://fonts.googleapis.com/css2?family=Outfit:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500&display=swap');
:root{
  /* Apple system colours */
  --c-p500:#007aff;--c-p100:#e5f1ff;--c-p200:#b8d8ff;--c-p700:#0051d0;
  --c-s50:#f9f9f9;--c-s100:#f2f2f7;--c-s200:#e5e5ea;--c-s300:#d1d1d6;
  --c-s500:#8e8e93;--c-s900:#000000;
  --c-ok:#34c759;--c-ok-bg:#e8f8ec;--c-ok-bd:#b8ebc4;
  --c-er:#ff3b30;--c-er-bg:#ffeceb;--c-er-bd:#ffc6c2;
  --c-wa:#ff9500;--c-wa-bg:#fff3e0;--c-wa-bd:#ffd89a;
  --c-bg:#f2f2f7;--c-card:#ffffff;--c-card-alt:#fafafa;
  /* System font stack — resolves to SF on Apple platforms, system default elsewhere */
  --f-s:-apple-system,BlinkMacSystemFont,"SF Pro Text","Segoe UI",Roboto,sans-serif;
  --f-m:ui-monospace,"SF Mono",SFMono-Regular,Menlo,Consolas,monospace;
  /* Generous Apple-style radii */
  --r:12px;--rs:8px;
  --sh:0 1px 2px rgb(0 0 0/.04);
  --sh2:0 4px 16px -2px rgb(0 0 0/.08),0 2px 4px -2px rgb(0 0 0/.04);}
.dark{
  --c-p500:#0a84ff;--c-p100:#0a2647;--c-p200:#0c3a6e;--c-p700:#5eb3ff;
  --c-s50:#1c1c1e;--c-s100:#000000;--c-s200:#2c2c2e;--c-s300:#3a3a3c;
  --c-s500:#8e8e93;--c-s900:#ffffff;
  --c-ok:#30d158;--c-ok-bg:#0a2e14;--c-ok-bd:#155529;
  --c-er:#ff453a;--c-er-bg:#3d0b08;--c-er-bd:#6b1410;
  --c-wa:#ff9f0a;--c-wa-bg:#3d2708;--c-wa-bd:#6b4410;
  --c-bg:#000000;--c-card:#1c1c1e;--c-card-alt:#2c2c2e;
  --sh:0 1px 2px rgb(0 0 0/.3);
  --sh2:0 4px 16px -2px rgb(0 0 0/.5),0 2px 4px -2px rgb(0 0 0/.3);}
*{box-sizing:border-box}
body{margin:0;background:var(--c-bg);font-family:var(--f-s);color:var(--c-s900);-webkit-font-smoothing:antialiased;line-height:1.47;font-size:16px;transition:background .2s,color .2s}
.app{padding:1.5rem 1.25rem 3rem;max-width:1080px;margin:0 auto}
.m{font-family:var(--f-m);font-variant-numeric:tabular-nums}
.mu{color:var(--c-s500);font-size:.875rem}
.eb{font-size:.75rem;font-weight:600;color:var(--c-s500);letter-spacing:.01em;text-transform:none}
/* Banner */
.banner{display:flex;align-items:center;gap:.75rem;margin-bottom:1.5rem;padding:0 .25rem}
.banner-text h1{margin:0;font-size:1.5rem;font-weight:700;color:var(--c-s900);letter-spacing:-.02em;line-height:1.1}
.banner-right{margin-left:auto;display:flex;gap:.5rem;align-items:center}
.tst-dot{width:8px;height:8px;border-radius:50%;display:inline-block;margin-right:.3rem;vertical-align:middle}
.tst-dot-ok{background:var(--c-ok)}
.tst-dot-fail{background:var(--c-er)}
/* Inputs */
.inp{font-family:var(--f-s);font-size:1rem;border:1px solid var(--c-s200);background:var(--c-card);padding:.625rem .875rem;border-radius:var(--rs);color:var(--c-s900);width:100%;transition:border-color .15s,box-shadow .15s,background .15s}
.inp:focus{outline:none;border-color:var(--c-p500);box-shadow:0 0 0 4px rgb(0 122 255/.15)}
.bare{border-color:transparent;background:transparent;padding:.375rem .5rem}
.bare:hover{border-color:var(--c-s200);background:var(--c-card)}
.money{font-family:var(--f-m);font-variant-numeric:tabular-nums;text-align:right}
.mw{position:relative;display:inline-flex;align-items:center}
.mw::before{content:'\00a3';position:absolute;left:.625rem;font-family:var(--f-m);font-size:.875rem;color:var(--c-s500);pointer-events:none;z-index:1}
.mw .money{padding-left:1.375rem}
.mw-bare::before{left:.375rem}
.mw-bare .money{padding-left:1.1rem}
.mw-lg::before{font-size:1rem;left:.75rem}
.mw-lg .money{padding-left:1.625rem}
.inp-amt{border:1px solid var(--c-s200);background:var(--c-card);padding:.5rem .75rem;border-radius:var(--rs);font-size:.9375rem;font-weight:500;font-family:var(--f-m);color:var(--c-s900);transition:border-color .15s,box-shadow .15s}
.inp-amt:hover{border-color:var(--c-s300)}
.inp-amt:focus{outline:none;border-color:var(--c-p500);box-shadow:0 0 0 4px rgb(0 122 255/.15)}
/* Buttons */
.btn{font-family:var(--f-s);font-weight:500;font-size:.9375rem;border:none;background:var(--c-s100);color:var(--c-p500);cursor:pointer;padding:.55rem 1rem;border-radius:var(--rs);transition:background .15s,transform .1s;white-space:nowrap;-webkit-tap-highlight-color:transparent}
.btn:hover{background:var(--c-s200)}
.btn:active{transform:scale(.97)}
.btn:focus-visible{outline:2px solid var(--c-p500);outline-offset:2px}
.btn-p{background:var(--c-p500);color:#fff}
.btn-p:hover{background:var(--c-p700)}
.btn-sm{padding:.4rem .75rem;font-size:.875rem}
.btn-lnk{background:none;border:none;color:var(--c-p500);cursor:pointer;font-family:var(--f-s);font-size:.875rem;font-weight:500;padding:0}
.btn-lnk:hover{color:var(--c-p700);text-decoration:underline}
.add{background:var(--c-s100);border:none;color:var(--c-p500);cursor:pointer;font-family:var(--f-s);font-size:.9375rem;font-weight:500;padding:.625rem 1rem;border-radius:var(--rs);width:100%;margin-top:.5rem;transition:background .15s}
.add:hover{background:var(--c-s200)}
.x{background:none;border:none;color:var(--c-s500);cursor:pointer;padding:.25rem .5rem;border-radius:var(--rs);font-size:1rem;transition:background .12s,color .12s}
.x:hover{background:var(--c-er-bg);color:var(--c-er)}
.mv{background:none;border:none;color:var(--c-s500);cursor:pointer;padding:.2rem .4rem;border-radius:.25rem;font-size:.7rem;line-height:1}
.mv:hover{background:var(--c-p100);color:var(--c-p700)}
/* Pots */
.pot{background:var(--c-card);border:1px solid var(--c-s200);border-radius:var(--r);overflow:hidden;transition:border-color .15s}
.pot:hover{border-color:var(--c-s300)}
.pot-head{display:flex;align-items:center;gap:.875rem;padding:1rem 1.25rem;cursor:pointer;user-select:none;transition:background .15s;-webkit-tap-highlight-color:transparent}
.pot-head:hover{background:var(--c-s50)}
.pot-head:active{background:var(--c-s100)}
.pot-name{font-weight:600;font-size:1rem;letter-spacing:-.01em}
.pot-sub{font-size:.8125rem;color:var(--c-s500);margin-top:.15rem}
.pot-amt{font-family:var(--f-m);font-weight:500;font-size:1.0625rem;flex-shrink:0;text-align:right;letter-spacing:-.02em}
.pot-pct{font-size:.75rem;color:var(--c-s500);margin-top:.15rem;text-align:right}
.pot-chev{color:var(--c-s500);font-size:.625rem;transition:transform .15s;flex-shrink:0}
.pot-chev.o{transform:rotate(90deg)}
.pot-bar{height:3px;background:var(--c-s200)}
.pot-bar-fill{height:100%;background:var(--c-p500);transition:width .4s ease;border-radius:0 2px 2px 0}
.pot-body{border-top:1px solid var(--c-s200);padding:.875rem 1.25rem 1.125rem;background:var(--c-card-alt)}
.sub{display:flex;align-items:center;gap:.5rem;padding:.2rem 0}
.pot-tools{display:flex;gap:.5rem;justify-content:space-between;align-items:center;margin-top:.875rem;padding-top:.875rem;border-top:1px dashed var(--c-s300);flex-wrap:wrap}
.pot-note textarea{font-family:var(--f-s);font-size:.8125rem;border:1px solid transparent;background:transparent;color:var(--c-s500);padding:.375rem .5rem;border-radius:var(--rs);width:100%;resize:none;min-height:2rem;margin-top:.5rem;transition:border-color .12s,background .12s}
.pot-note textarea:hover{border-color:var(--c-s200);background:var(--c-card)}
.pot-note textarea:focus{outline:none;border-color:var(--c-p500);background:var(--c-card);color:var(--c-s900)}
.pot-grid{display:grid;grid-template-columns:1fr;gap:.75rem;margin-bottom:.75rem}
@media(min-width:768px){.pot-grid{grid-template-columns:1fr 1fr}}
.pot-ghost{color:var(--c-s500);font-size:.75rem;font-family:var(--f-m);margin-top:.375rem}
.rollover-pill{font-size:.7rem;font-weight:500;background:var(--c-p100);color:var(--c-p500);padding:.15rem .5rem;border-radius:9999px;flex-shrink:0}
/* Alerts */
.ins{padding:.75rem 1rem;border-radius:var(--rs);font-size:.875rem;margin-bottom:.5rem;display:flex;gap:.5rem;align-items:flex-start;border:1px solid transparent;line-height:1.4}
.insi{background:var(--c-p100);color:var(--c-p700);border-color:var(--c-p200)}
.insw{background:var(--c-wa-bg);color:var(--c-wa);border-color:var(--c-wa-bd)}
.inse{background:var(--c-er-bg);color:var(--c-er);border-color:var(--c-er-bd)}
/* Summary */
.summary{background:var(--c-card);border:1px solid var(--c-s200);border-radius:var(--r);padding:1.5rem;margin-bottom:1.25rem}
.summary-stats{display:flex;gap:1.5rem;flex-wrap:wrap;align-items:flex-start;margin-bottom:.875rem}
.hnum{font-family:var(--f-m);font-size:1.375rem;font-weight:500;line-height:1;letter-spacing:-.03em}
.health-pill{display:inline-block;font-size:.75rem;font-weight:500;padding:.25rem .625rem;border-radius:9999px}
.summary-track{height:5px;background:var(--c-s200);border-radius:9999px;overflow:hidden}
.summary-track-fill{height:100%;border-radius:9999px;transition:width .6s ease}
/* Collapsible cards */
.card{background:var(--c-card);border:1px solid var(--c-s200);border-radius:var(--r);margin-bottom:.75rem;overflow:hidden}
.sh{padding:1rem 1.25rem;display:flex;justify-content:space-between;align-items:center;cursor:pointer;user-select:none;gap:.5rem;transition:background .15s;-webkit-tap-highlight-color:transparent}
.sh:hover{background:var(--c-s50)}
.sh:active{background:var(--c-s100)}
.h2{font-size:1.0625rem;font-weight:600;margin:0;display:flex;align-items:center;gap:.5rem;letter-spacing:-.01em}
.sb{padding:.25rem 1.25rem 1.25rem}
/* Misc widgets */
.distrib{background:var(--c-p100);border:1px solid var(--c-p200);border-radius:var(--r);padding:1rem 1.25rem;margin-bottom:.75rem;display:flex;justify-content:space-between;align-items:flex-start;gap:.75rem;flex-wrap:wrap}
.cdpill{display:inline-block;font-size:.8125rem;font-weight:500;color:var(--c-p500);background:var(--c-p100);padding:.25rem .75rem;border-radius:9999px;margin-top:.375rem}
.diff-bar{background:var(--c-card);border:1px solid var(--c-s200);border-radius:var(--r);padding:.75rem 1.25rem;margin-bottom:1.25rem;display:flex;gap:.625rem;flex-wrap:wrap;align-items:center;font-size:.875rem}
.closeout{background:var(--c-ok-bg);border:1px solid var(--c-ok-bd);border-radius:var(--r);padding:1rem 1.25rem;margin-bottom:1.25rem;display:flex;align-items:center;justify-content:space-between;gap:.75rem;flex-wrap:wrap}
.afford{background:var(--c-card);border:1px solid var(--c-s200);border-radius:var(--r);padding:1.25rem 1.5rem;margin-bottom:.75rem}
.afford-row{display:flex;gap:.75rem;align-items:center;flex-wrap:wrap}
.afford-result{margin-top:.5rem;padding:.625rem .875rem;border-radius:var(--rs);font-size:.85rem}
.var-row{display:flex;align-items:center;gap:.75rem;padding:.375rem 0;border-bottom:1px solid var(--c-s200);font-size:.875rem}
.var-row:last-child{border-bottom:none}
.var-chip{font-size:.7rem;font-weight:700;padding:.15rem .45rem;border-radius:9999px;flex-shrink:0;font-family:var(--f-m)}
.var-over{background:var(--c-er-bg);color:var(--c-er);border:1px solid var(--c-er-bd)}
.var-under{background:var(--c-ok-bg);color:var(--c-ok);border:1px solid var(--c-ok-bd)}
.var-on{background:var(--c-s100);color:var(--c-s500);border:1px solid var(--c-s200)}
.target-row{display:flex;gap:.75rem;align-items:flex-start;flex-wrap:wrap;margin-top:.375rem}
.target-bar{height:4px;background:var(--c-s200);border-radius:9999px;overflow:hidden;margin-top:.5rem}
.target-bar-fill{height:100%;border-radius:9999px;background:var(--c-p500);transition:width .4s ease}
.overpay-result{background:var(--c-p100);border:1px solid var(--c-p200);border-radius:var(--rs);padding:.75rem 1rem;margin-top:.75rem;font-size:.875rem;line-height:1.8}
.ntfy-row{display:flex;gap:.5rem;align-items:center;flex-wrap:wrap;margin-top:.5rem}

.undo-toast{position:fixed;bottom:1.5rem;left:50%;transform:translateX(-50%);background:var(--c-s900);color:var(--c-card);padding:.75rem 1.25rem;border-radius:9999px;font-size:.9375rem;display:flex;align-items:center;gap:.75rem;z-index:100;box-shadow:var(--sh2);white-space:nowrap}
.undo-toast button{background:var(--c-p500);color:#fff;border:none;padding:.25rem .875rem;border-radius:9999px;cursor:pointer;font-family:var(--f-s);font-size:.8125rem;font-weight:600}
.gate{min-height:100vh;display:flex;align-items:center;justify-content:center;padding:1rem;background:var(--c-bg)}
.gate-box{background:var(--c-card);border-radius:var(--r);box-shadow:var(--sh2);padding:2.5rem 2rem;width:360px;max-width:100%}
.err-box{background:var(--c-er-bg);border:1px solid var(--c-er-bd);color:var(--c-er);padding:1rem 1.25rem;border-radius:var(--r);margin-bottom:1rem;font-size:.9375rem}
.tbl{width:100%;border-collapse:collapse}
.tbl td,.tbl th{padding:.5rem .625rem}
.zbr>tbody>tr:nth-child(even) td{background:var(--c-card-alt)}
.sel{font-family:var(--f-s);font-size:1.25rem;font-weight:600;border:none;background:transparent;padding:.25rem .5rem;border-radius:var(--rs);cursor:pointer;color:var(--c-s900);transition:background .15s;letter-spacing:-.01em}
.sel:hover{background:var(--c-s100)}
.sel:focus{outline:2px solid var(--c-p500);outline-offset:2px;background:var(--c-s100)}
.sel option{background:var(--c-card);color:var(--c-s900)}
.theme-btn{background:var(--c-s100);border:none;border-radius:50%;width:36px;height:36px;display:flex;align-items:center;justify-content:center;cursor:pointer;font-size:1rem;transition:background .15s}
.theme-btn:hover{background:var(--c-s200)}
@media(max-width:600px){
  .app{padding:1rem .875rem 2rem}
  .sel{font-size:1.125rem}
  .pot-head{padding:.875rem 1rem}
  .pot-body{padding:.75rem 1rem 1rem}
  .pot-amt{font-size:1rem}
  .banner-text h1{font-size:1.25rem}
  .summary{padding:1.25rem}}

/* ── Offline indicator ──────── */
.status-pill{position:fixed;top:1.25rem;right:1.25rem;font-size:.8125rem;font-weight:500;padding:.35rem 1rem;border-radius:9999px;z-index:50;box-shadow:var(--sh2);transition:opacity .2s,background .2s}
.status-ok{background:var(--c-card);color:var(--c-ok);border:1px solid var(--c-ok-bd)}
.status-offline{background:var(--c-wa-bg);color:var(--c-wa);border:1px solid var(--c-wa-bd)}
.status-saving{background:var(--c-card);color:var(--c-s500);border:1px solid var(--c-s200)}
.status-hidden{opacity:0;pointer-events:none}
/* ── History table ──────────── */
.hist-tbl{width:100%;border-collapse:collapse;font-size:.9375rem}
.hist-tbl th,.hist-tbl td{padding:.625rem .5rem;text-align:left;border-bottom:1px solid var(--c-s200)}
.hist-tbl th{font-weight:600;color:var(--c-s500);font-size:.8125rem}
.hist-tbl td.num{text-align:right;font-family:var(--f-m);font-variant-numeric:tabular-nums}
.hist-bar{display:inline-block;width:50px;height:6px;background:var(--c-s200);border-radius:3px;overflow:hidden;vertical-align:middle;margin-right:.5rem}
.hist-bar-fill{height:100%;background:var(--c-ok);transition:width .3s}
/* ── Backup buttons row ──── */
.backup-row{display:flex;gap:.5rem;flex-wrap:wrap;margin-bottom:.5rem}

/* ── 3-month forecast strip ──── */
.fcast{display:flex;gap:.625rem;margin-bottom:1rem;flex-wrap:wrap}
.fcast-month{flex:1 1 calc(33% - .5rem);min-width:90px;background:var(--c-card);border:1px solid var(--c-s200);border-radius:var(--r);padding:.75rem .875rem;transition:border-color .15s}
.fcast-month:hover{border-color:var(--c-s300)}
.fcast-label{font-size:.75rem;font-weight:500;color:var(--c-s500);margin-bottom:.25rem}
.fcast-value{font-family:var(--f-m);font-size:1.0625rem;font-weight:500;letter-spacing:-.02em;line-height:1}
.fcast-tag{font-size:.75rem;color:var(--c-s500);margin-top:.25rem;line-height:1.3}
.fcast-good{color:var(--c-ok)}
.fcast-tight{color:var(--c-wa)}
.fcast-bad{color:var(--c-er)}

/* ── Auto-allocate ────── */
.aa-panel{background:var(--c-card);border:1px solid var(--c-s200);border-radius:var(--r);padding:1.25rem 1.5rem;margin-bottom:.75rem}
.aa-row{display:flex;gap:.75rem;align-items:flex-start;flex-wrap:wrap}
.aa-headline{flex:1;min-width:200px}
.aa-headline h3{margin:0 0 .25rem;font-size:1.0625rem;font-weight:600;letter-spacing:-.01em}
.aa-results{margin-top:.875rem;padding-top:.875rem;border-top:1px solid var(--c-s200)}
.aa-result-row{display:flex;align-items:center;gap:.5rem;padding:.4rem 0;font-size:.875rem;border-bottom:1px solid var(--c-s100)}
.aa-result-row:last-child{border-bottom:none}
.aa-result-name{flex:1;min-width:0;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;font-weight:500}
.aa-result-old{color:var(--c-s500);font-family:var(--f-m);font-size:.8125rem;text-decoration:line-through;text-decoration-color:var(--c-s300)}
.aa-result-arrow{color:var(--c-s500);font-size:.8125rem}
.aa-result-new{font-family:var(--f-m);font-weight:500;font-size:.9375rem;color:var(--c-s900);min-width:60px;text-align:right}
.aa-explain{font-size:.8125rem;color:var(--c-s500);margin-top:.5rem;line-height:1.5}
.aa-tag{font-size:.7rem;font-weight:500;padding:.1rem .45rem;border-radius:9999px;flex-shrink:0;margin-left:.4rem}
.aa-tag-default{background:var(--c-ok-bg);color:var(--c-ok)}
.aa-tag-trim{background:var(--c-wa-bg);color:var(--c-wa)}
.aa-tag-cut{background:var(--c-er-bg);color:var(--c-er)}
</style>

// School term-time periods (inclusive). Each entry: [startISO, endISO]
// During these spans (Mon-Fri only), kids are at after-school club.
const TERM_DATES=[
  // 2025-26 Summer term
  ['2026-04-21','2026-05-22'],
  ['2026-06-01','2026-07-22'],
  // 2026-27 Autumn term
  ['2026-09-03','2026-10-23'],
  ['2026-11-02','2026-12-18'],
  // 2026-27 Spring term
  ['2027-01-05','2027-02-12'],
  ['2027-02-22','2027-03-25'],
  // 2026-27 Summer term
  ['2027-04-14','2027-05-28'],
  ['2027-06-07','2027-07-21'],
];
function isTermTime(d){
  const i=iso(d);
  return TERM_DATES.some(([s,e])=>i>=s&&i<=e);}
// Average Fridays in a typical 4-week month is approximately 4 — used as baseline for "more/less than usual"
const AVG_TERM_FRIDAYS=3;
// Count Fridays between two dates that fall inside term time
function termFridays(start,end){
  let n=0;const d=new Date(start);
  while(d<end){if(d.getDay()===5&&isTermTime(d))n++;d.setDate(d.getDate()+1)}
  return n}
// List the actual Friday dates within term time for a pay period (for tooltips)
function termFridayDates(start,end){
  const out=[];const d=new Date(start);
  while(d<end){if(d.getDay()===5&&isTermTime(d))out.push(new Date(d));d.setDate(d.getDate()+1)}
  return out}

function bdIn(bds,p){
  const start=new Date(p);start.setDate(start.getDate()+7);
  const np=npd(p.getFullYear(),p.getMonth());
  const end=new Date(np);end.setDate(end.getDate()+7);
  const out=[];
  bds.forEach(b=>{for(const y of[start.getFullYear(),start.getFullYear()+1]){const d=new Date(y,b.month-1,b.day);if(d>=start&&d<end){out.push({...b,dateObj:d});break}}});
  return out}
function rollM(bal,rp,pm,mo){let b=bal,i=rp/100/12;for(let k=0;k<mo;k++)b=Math.max(0,b-(pm-b*i));return b}
function pmtFor(bal,rp,mo){const i=rp/100/12;return i===0?bal/mo:(bal*i)/(1-Math.pow(1+i,-mo))}
function monthsToTarget(saved,target,monthly){if(monthly<=0||saved>=target)return 0;return Math.ceil((target-saved)/monthly)}
function daysUntil(target){const n=new Date(),t=new Date(+target);n.setHours(0,0,0,0);t.setHours(0,0,0,0);return Math.round((t-n)/86400000)}

function forecastMonth(targetYr,targetMi,income,pots,monthlyAmts,annualEvents,birthdays,shopRate,friRate,histAvg){
  // Build per-pot amount estimate without React deps
  const tp=pd(targetYr,targetMi);
  const tnp=npd(targetYr,targetMi);
  const we=cd(tp,tnp,6);
  const fr=termFridays(tp,tnp);
  const bdaysIn=bdIn(birthdays,tp);
  const annualIn=annualEvents.filter(a=>a.pay_month===targetMi&&(!a.year||Number(a.year)===targetYr));
  let total=0;
  const reasons=[];
  pots.forEach(p=>{
    let amt=0;
    if(p.kind==='list')amt=(p.items||[]).reduce((a,b)=>a+Number(b.amount||0),0);
    else if(p.kind==='fixed'){
      // Forecast: use historical avg if available, else current monthly override, else base
      amt=histAvg[p.id]??Number(monthlyAmts[p.id]??p.amount??0);}
    else if(p.kind==='auto-shopping')amt=we*Number(shopRate||0);
    else if(p.kind==='auto-afterschool')amt=fr*Number(friRate||0);
    else if(p.kind==='auto-birthdays')amt=bdaysIn.reduce((a,b)=>a+Number(b.amount||0),0);
    else if(p.kind==='auto-annual')amt=annualIn.reduce((a,b)=>a+Number(b.amount||0),0);
    else if(p.kind==='savings')amt=Number(monthlyAmts[p.id]??p.monthly??0);
    total+=amt;});
  if(annualIn.length){
    const annualTot=annualIn.reduce((a,b)=>a+Number(b.amount||0),0);
    if(annualTot>=100)reasons.push(annualIn.map(a=>a.name).join(', '));}
  if(bdaysIn.length>=2)reasons.push(bdaysIn.length+' birthdays');
  if(we>=5)reasons.push('5-weekend month');
  return{total:Math.round(total),buffer:Math.round(income-total),reasons,tp,we,bdaysCount:bdaysIn.length,annualTot:annualIn.reduce((a,b)=>a+Number(b.amount||0),0)};}

// Auto-allocate algorithm.
// Inputs: list of pots, current per-pot amounts, defaults map, income, bills/auto totals.
// Returns: {amounts:{id:value}, changes:[{pot,old,new,reason}], explain}
function autoAllocate(pots,monthlyAmts,defaults,income,fixedExpenses,we,fr,shopRate,friRate,bdays,annual){
  // Step 1: compute committed (non-discretionary) total
  let committed=0;
  pots.forEach(p=>{
    if(p.kind==='list')committed+=(p.items||[]).reduce((a,b)=>a+Number(b.amount||0),0);
    else if(p.kind==='auto-shopping')committed+=we*Number(shopRate||0);
    else if(p.kind==='auto-afterschool')committed+=fr*Number(friRate||0);
    else if(p.kind==='auto-birthdays')committed+=bdays.reduce((a,b)=>a+Number(b.amount||0),0);
    else if(p.kind==='auto-annual')committed+=annual.reduce((a,b)=>a+Number(b.amount||0),0);
    else if(p.kind==='savings')committed+=Number(monthlyAmts[p.id]??p.monthly??0);
  });
  // Step 2: identify discretionary pots (fixed kind only)
  // A pot has a default if it appears in `defaults`. Without a default, leave at current value.
  const discretionary=pots.filter(p=>p.kind==='fixed');
  const withDefault=discretionary.filter(p=>defaults[p.id]!==undefined);
  const withoutDefault=discretionary.filter(p=>defaults[p.id]===undefined);
  // Anything without a default is treated as committed at its current value
  withoutDefault.forEach(p=>{committed+=Number(monthlyAmts[p.id]??p.amount??0)});
  // Step 3: budget remaining for discretionary
  const available=income-committed;
  const totalDefaults=withDefault.reduce((sum,p)=>sum+defaults[p.id],0);
  const newAmounts={...monthlyAmts};
  const changes=[];
  let scenario='ideal';
  if(available>=totalDefaults){
    // Fits — use exact defaults, never go higher
    withDefault.forEach(p=>{
      const old=Number(monthlyAmts[p.id]??p.amount??0);
      const next=defaults[p.id];
      newAmounts[p.id]=next;
      if(old!==next)changes.push({pot:p,old,new:next,reason:'default'});
    });
  }else if(available>0){
    // Doesn't quite fit — proportionally trim to fit available
    const ratio=available/totalDefaults;
    scenario='trim';
    withDefault.forEach(p=>{
      const old=Number(monthlyAmts[p.id]??p.amount??0);
      const next=Math.max(0,Math.round(defaults[p.id]*ratio));
      newAmounts[p.id]=next;
      if(old!==next)changes.push({pot:p,old,new:next,reason:'trim'});
    });
  }else{
    // No money for discretionary — zero them all
    scenario='cut';
    withDefault.forEach(p=>{
      const old=Number(monthlyAmts[p.id]??p.amount??0);
      newAmounts[p.id]=0;
      if(old!==0)changes.push({pot:p,old,new:0,reason:'cut'});
    });
  }
  return{
    amounts:newAmounts,
    changes,
    scenario,
    available,
    totalDefaults,
    committed,
    income,
    discretionaryCount:withDefault.length,
  };}

function calcPotAmount(pot,we,fr,shopRate,friRate,bdays,annual,monthlyAmts={}){
  if(pot.kind==='list')return(pot.items||[]).reduce((a,b)=>a+Number(b.amount||0),0);
  if(pot.kind==='fixed')return Number(monthlyAmts[pot.id]??pot.amount??0);
  if(pot.kind==='auto-shopping')return we*Number(shopRate||0);
  if(pot.kind==='auto-afterschool')return fr*Number(friRate||0);
  if(pot.kind==='auto-birthdays')return bdays.reduce((a,b)=>a+Number(b.amount||0),0);
  if(pot.kind==='auto-annual')return annual.reduce((a,b)=>a+Number(b.amount||0),0);
  if(pot.kind==='savings')return Number(monthlyAmts[pot.id]??pot.monthly??0);
  return 0}

  // Plenty: 3000 income > 2096 committed + 280 defaults = 2376
  const aa1=autoAllocate(aaPots,{},aaDef,3000,0,4,4,140,9,[],[]);
  eq(aa1.scenario,'ideal','aa ideal scenario');
  eq(aa1.amounts['pot-petrol'],180,'aa petrol default');
  eq(aa1.amounts['pot-misc'],100,'aa misc default');
  // Exactly enough: income = committed + defaults
  const aa2=autoAllocate(aaPots,{},aaDef,2376,0,4,4,140,9,[],[]);
  eq(aa2.scenario,'ideal','aa exactly enough');
  // Tight: only 200 available for 280 of defaults → trim ratio 200/280 = 0.714
  const aa3=autoAllocate(aaPots,{},aaDef,2296,0,4,4,140,9,[],[]);
  eq(aa3.scenario,'trim','aa trim scenario');
  eq(aa3.amounts['pot-petrol']<=180,true,'aa trim respects petrol ceiling');
  eq(aa3.amounts['pot-misc']<=100,true,'aa trim respects misc ceiling');
  eq(aa3.amounts['pot-petrol']>0,true,'aa trim still allocates some');
  // No money: income < committed
  const aa4=autoAllocate(aaPots,{},aaDef,2000,0,4,4,140,9,[],[]);
  eq(aa4.scenario,'cut','aa cut scenario');
  eq(aa4.amounts['pot-petrol'],0,'aa cut zeros petrol');
  eq(aa4.amounts['pot-misc'],0,'aa cut zeros misc');
  // Pot without default: untouched
  const aaNoDef=[{id:'pot-other',kind:'fixed',amount:50,emoji:'?',name:'Other'}];
  const aa5=autoAllocate(aaNoDef,{'pot-other':50},aaDef,2000,0,4,4,140,9,[],[]);
  eq(aa5.amounts['pot-other'],50,'aa pot without default untouched');
  // termFridays + isTermTime
  // 21 Apr 2026 (Tue) through 22 May 2026 (Fri) - school open all term-time Fridays
  // First Friday after Tue 21 Apr is Fri 24 Apr.
  eq(isTermTime(new Date('2026-04-24')),true,'24 Apr 2026 is term time');
  eq(isTermTime(new Date('2026-05-29')),false,'29 May 2026 is half-term (holiday)');
  eq(isTermTime(new Date('2026-08-01')),false,'1 Aug 2026 is summer holiday');
  eq(isTermTime(new Date('2026-12-22')),false,'22 Dec 2026 is Christmas holiday');
  eq(isTermTime(new Date('2027-01-05')),true,'5 Jan 2027 is term time');
  // Count term-time Fridays between Apr 21 and May 22 (5 Fridays: 24 Apr, 1 May, 8 May, 15 May, 22 May)
  const apr21=new Date('2026-04-21'),may23=new Date('2026-05-23');
  eq(termFridays(apr21,may23),5,'5 term Fridays Apr 21 - May 22 2026');
  // August (school holiday) should yield 0 term Fridays
  eq(termFridays(new Date('2026-08-01'),new Date('2026-08-31')),0,'0 term Fridays in Aug');
  // forecastMonth
  const fcRes=forecastMonth(2026,5,3000,[{id:'p1',kind:'fixed',amount:500}],{},[],[],0,0,{});
  eq(fcRes.total,500,'forecast fixed pot');
  eq(fcRes.buffer,2500,'forecast buffer');
  const fcHist=forecastMonth(2026,5,3000,[{id:'p1',kind:'fixed',amount:500}],{},[],[],0,0,{p1:600});
  eq(fcHist.total,600,'forecast uses historical avg');
  const fcAnnual=forecastMonth(2026,5,3000,[{id:'p1',kind:'auto-annual'}],{},[{id:'a1',pay_month:5,name:'Insurance',amount:230}],[],0,0,{});
  eq(fcAnnual.total,230,'forecast annual events');
  console.info(`\u2705 Tests: ${pass} passed, ${fail} failed`);
  return{pass,fail}}

function AffordChecker({buffer,pots,potAmount}){
  const[item,setItem]=useState('');const[cost,setCost]=useState('');
  const costN=parseFloat(cost)||0;const show=item.trim()&&costN>0;
  const results=useMemo(()=>{
    if(!show)return[];const r=[];
    if(buffer>=costN)r.push({ok:true,t:'Yes \u2014 buffer covers this with '+gS(buffer-costN)+' left.'});
    else if(buffer>0)r.push({ok:false,t:'Buffer only covers '+gS(buffer)+'. Short by '+gS(costN-buffer)+'.'});
    else r.push({ok:false,t:'No buffer available.'});
    pots.filter(p=>p.kind==='fixed'&&Number(p.amount||0)>0).forEach(p=>{
      const a=potAmount(p);
      if(a>=costN)r.push({ok:true,t:'Yes from '+p.emoji+' '+p.name+' ('+gS(a)+' available).'});
      else if(a>50)r.push({ok:false,t:'Partial: '+p.emoji+' '+p.name+' has '+gS(a)+', still '+gS(costN-a)+' short.'})});
    if(costN>200)r.push({ok:true,t:'Yes if split over 2 months ('+gS(Math.ceil(costN/2))+'/month).'});
    return r},[show,buffer,costN,pots]);
  return h('div',{className:'afford'},
    h('div',{className:'eb',style:{marginBottom:'.5rem'}},'Can I afford it?'),
    h('div',{className:'afford-row'},
      h('input',{className:'inp',placeholder:'What is it?',value:item,onChange:e=>setItem(e.target.value),style:{flex:1,minWidth:100}}),

function BackupRestore(){
  const fileInput=useRef(null);
  const doBackup=async()=>{
    if(!sb){alert('No database connected.');return}
    const{data,error}=await sb.from('kv_store').select('key,value,updated_at');
    if(error){alert('Backup failed: '+error.message);return}
    const blob=new Blob([JSON.stringify({exported:new Date().toISOString(),version:1,rows:data},null,2)],{type:'application/json'});
    const url=URL.createObjectURL(blob);
    const a=document.createElement('a');
    a.href=url;a.download='budget-planner-backup-'+new Date().toISOString().slice(0,10)+'.json';
    document.body.appendChild(a);a.click();document.body.removeChild(a);
    URL.revokeObjectURL(url);};
  const doRestore=async(file)=>{
    if(!sb){alert('No database connected.');return}
    if(!confirm('Restore from this backup? All current data will be replaced.'))return;
    try{
      const txt=await file.text();
      const parsed=JSON.parse(txt);
      if(!parsed.rows||!Array.isArray(parsed.rows))throw new Error('Invalid backup file');
      // Delete existing rows that will be replaced
      const keys=parsed.rows.map(r=>r.key);
      await sb.from('kv_store').delete().in('key',keys);
      const{error}=await sb.from('kv_store').upsert(parsed.rows.map(r=>({key:r.key,value:r.value,updated_at:r.updated_at||new Date().toISOString()})));
      if(error)throw error;
      alert('Restored '+parsed.rows.length+' records. Reloading\u2026');
      location.reload();
    }catch(e){alert('Restore failed: '+e.message)}};
  return h('div',{className:'backup-row'},
    h('button',{className:'btn btn-sm',onClick:doBackup},'\u2b07 Download backup'),
    h('button',{className:'btn btn-sm',onClick:()=>fileInput.current?.click()},'\u2b06 Restore from file'),
    h('input',{ref:fileInput,type:'file',accept:'application/json',style:{display:'none'},
      onChange:e=>{const f=e.target.files?.[0];if(f){doRestore(f);e.target.value=''}}}))}

  return h('div',null,

        return h('div',{key:m.y+'-'+m.m,className:'fcast-month'},
          h('div',{className:'fcast-label'},MF[m.m]+(m.y!==yr?' '+m.y:'')),
          h('div',{className:'fcast-value '+cls},(m.buffer<0?'\u2212':'')+gS(Math.abs(m.buffer))),
          h('div',{className:'fcast-tag '+cls},label),
          m.reasons.length>0&&h('div',{className:'fcast-tag'},m.reasons.slice(0,2).join(' \u00b7 ')));})));}

function AutoAllocate({pots,monthlyAmts,setMonthlyAmts,dirtyMonthly,income,we,fr,shopRate,friRate,bH,anT,mi,yr}){
  const[preview,setPreview]=useState(null);
  const compute=()=>{
    const result=autoAllocate(pots,monthlyAmts,POT_DEFAULTS,income,0,we,fr,shopRate,friRate,bH,anT);
    setPreview(result);};
  const apply=()=>{
    if(!preview)return;
    dirtyMonthly.current=true;
    setMonthlyAmts(preview.amounts);
    setPreview(null);};
  const cancel=()=>setPreview(null);
  if(!preview){
    return h('div',{className:'aa-panel'},
      h('div',{className:'aa-row'},
        h('div',{className:'aa-headline'},
          h('h3',null,'Auto-allocate '+MF[mi]),
          h('div',{className:'mu',style:{fontSize:'.875rem'}},'Set discretionary pots to sensible defaults, trimming if money is tight. Calendar costs and birthdays come first.')),
        h('button',{className:'btn btn-p',onClick:compute},'Plan this month →')));}
  // Preview state
  const tag=preview.scenario==='ideal'?{cls:'aa-tag-default',label:'using defaults'}
    :preview.scenario==='trim'?{cls:'aa-tag-trim',label:'trimmed to fit'}
    :{cls:'aa-tag-cut',label:'no spare money'};
  const explainText=preview.scenario==='ideal'
    ?'You have '+gS(preview.available)+' for discretionary pots, which fully covers the '+gS(preview.totalDefaults)+' of defaults.'
    :preview.scenario==='trim'
    ?'You have '+gS(preview.available)+' for discretionary pots, but the defaults add up to '+gS(preview.totalDefaults)+'. Trimmed proportionally to fit.'
    :'After committed pots ('+gS(preview.committed)+'), there’s nothing left for discretionary spending. Pots set to zero — you may need to push something to next month.';
  return h('div',{className:'aa-panel'},
    h('div',{className:'aa-row'},
      h('div',{className:'aa-headline'},
        h('h3',null,'Auto-allocate preview',h('span',{className:'aa-tag '+tag.cls},tag.label)),
        h('div',{className:'aa-explain'},explainText)),
      h('div',{style:{display:'flex',gap:'.5rem',flexShrink:0}},
        h('button',{className:'btn btn-sm',onClick:cancel},'Cancel'),
        h('button',{className:'btn btn-sm btn-p',onClick:apply},'Apply '+preview.changes.length+' change'+(preview.changes.length===1?'':'s')))),
    preview.changes.length===0
      ?h('div',{className:'aa-results'},h('div',{className:'mu'},'No changes — your discretionary pots are already at the right amounts.'))
      :h('div',{className:'aa-results'},
          preview.changes.map(ch=>h('div',{key:ch.pot.id,className:'aa-result-row'},
            h('span',{style:{fontSize:'1.125rem'}},ch.pot.emoji),
            h('span',{className:'aa-result-name'},ch.pot.name),
            h('span',{className:'aa-result-old'},gS(ch.old)),
            h('span',{className:'aa-result-arrow'},'→'),
            h('span',{className:'aa-result-new',style:{color:ch.new===0?'var(--c-er)':ch.new<ch.old?'var(--c-wa)':'var(--c-ok)'}},gS(ch.new))))));}

function App(){
  const today=new Date();
  const[dark,setDark]=useState(()=>localStorage.getItem('pp_dark')==='1');
  useEffect(()=>{document.body.classList.toggle('dark',dark);localStorage.setItem('pp_dark',dark?'1':'0')},[dark]);

  const[L,setL]=useState(false);const[loadErr,setLoadErr]=useState(null);
  const[yr,setYr]=useState(today.getFullYear());
  const[mi,setMi]=useState(today.getDate()>14?today.getMonth():(today.getMonth()-1+12)%12);
  const[s,setS]=useState(DS);const[pots,setPots]=useState(DP);
  const[an,setAn]=useState(DA);const[bd,setBd]=useState(DD);
  const[open,setOpen]=useState({});const[editing,setEditing]=useState({});
  const[monthlyAmts,setMonthlyAmts]=useState({});
  const[prevAmts,setPrevAmts]=useState({});
  const[actual,setActual]=useState({});
  const[closed,setClosed]=useState({});
  const[histData,setHistData]=useState({});
  const[bhV,setBhV]=useState(0);
  const[rateInfo,setRateInfo]=useState(LIVE_RATES);
  const[undoData,setUndoData]=useState(null);const[showUndo,setShowUndo]=useState(false);
  const dirtyMonthly=useRef(false);const dirtyActual=useRef(false);const potsRef=useRef([]);

  // Init
  useEffect(()=>{
    refreshBankHolidays().then(ok=>{if(ok)setBhV(v=>v+1)});
    loadCachedRates().then(age=>{setRateInfo({...LIVE_RATES});if(age===undefined||age>6)fetchLiveRates().then(r=>{if(r.ok)setRateInfo({...LIVE_RATES})})});
  },[]);
  useEffect(()=>{potsRef.current=pots},[pots]);
  useEffect(()=>{(async()=>{const d=await loadAll();setS(d.settings);setPots(d.pots);setAn(d.annual);setBd(d.birthdays);setActual(d.actual);setClosed(d.closed);if(d.error)setLoadErr(d.error);setL(true)})()},[]);

  // Saves
  useEffect(()=>{if(L)saveKey('pp:settings',s)},[s,L]);
  useEffect(()=>{if(L)saveKey('pp:pots',pots)},[pots,L]);
  useEffect(()=>{if(L)saveKey('pp:annual',an)},[an,L]);
  useEffect(()=>{if(L)saveKey('pp:birthdays',bd)},[bd,L]);
  useEffect(()=>{if(L&&dirtyActual.current)saveKey('pp:actual',actual)},[actual,L]);
  useEffect(()=>{if(L)saveKey('pp:closed',closed)},[closed,L]);
  useEffect(()=>{
    if(!L||!dirtyMonthly.current)return;
    saveKey(MK(yr,mi),monthlyAmts);
    if(buffer<0&&s.ntfyEnabled&&s.ntfyChannel)sendNtfy(s.ntfyChannel,'Budget shortfall',MF[mi]+': '+gS(Math.abs(buffer))+' overspent.');
  },[monthlyAmts,L]);

  // Monthly amounts: load current + prev, auto-copy with rollover
  useEffect(()=>{
    if(!sb||!L)return;
    dirtyMonthly.current=false;
    const[py,pm]=prevMo(yr,mi);
    (async()=>{
      const[{data},{data:prev}]=await Promise.all([
        sb.from('kv_store').select('value').eq('key',MK(yr,mi)).maybeSingle(),
        sb.from('kv_store').select('value').eq('key',MK(py,pm)).maybeSingle()
      ]);
      setPrevAmts(prev?.value||{});
      if(data?.value&&Object.keys(data.value).length){setMonthlyAmts(data.value);return;}
      if(prev?.value&&Object.keys(prev.value).length){
        const n={...prev.value};
        potsRef.current.filter(p=>p.rollover&&p.kind==='fixed').forEach(p=>{if(n[p.id]!==undefined)n[p.id]=Number(n[p.id])+Number(p.amount||0)});
        setMonthlyAmts(n);
      }else setMonthlyAmts({});
    })();
  },[mi,yr,L]);

  // Snapshot + history
  useEffect(()=>{
    if(!L||!sb)return;
    const keys=[];let[cy,cm]=[yr,mi];
    for(let i=0;i<3;i++){[cy,cm]=prevMo(cy,cm);keys.push(`pp:snap:${cy}:${cm}`);}
    sb.from('kv_store').select('value').in('key',keys).then(({data})=>{
      if(!data?.length)return;
      const byPot={};
      data.forEach(row=>Object.entries(row.value?.perPot||{}).forEach(([id,amt])=>{byPot[id]=byPot[id]||[];byPot[id].push(Number(amt))}));
      setHistData(Object.fromEntries(Object.entries(byPot).map(([id,amts])=>[id,Math.round(amts.reduce((a,b)=>a+b,0)/amts.length)])));
    });
  },[mi,yr,L]);

  useEffect(()=>{
    if(!L||!sb)return;
    const perPot={};
    pots.filter(p=>p.kind==='fixed').forEach(p=>{perPot[p.id]=Number(monthlyAmts[p.id]??p.amount)});
    sb.from('kv_store').upsert({key:`pp:snap:${yr}:${mi}`,value:{income:s.income,potsTotal,buffer,pct:planningPct,at:new Date().toISOString(),perPot},updated_at:new Date().toISOString()}).then(()=>{});
  },[L,mi,yr]);

  // Realtime
  useEffect(()=>{
    if(!sb)return;let ch=null;
    try{ch=sb.channel('pp-rt').on('postgres_changes',{event:'UPDATE',schema:'public',table:'kv_store'},ev=>{
      try{const{key,value}=ev.new||{};if(!KEYS.includes(key)||Date.now()-(lastSaved[key]||0)<2500)return;
        if(key==='pp:settings')setS(value);if(key==='pp:pots')setPots(value);
        if(key==='pp:annual')setAn(value);if(key==='pp:birthdays')setBd(value);
      }catch(e){}}).subscribe((st,err)=>{if(err)console.info('Realtime unavailable')});}
    catch(e){console.info('Realtime unavailable');}
    return()=>{try{if(ch)sb.removeChannel(ch)}catch(e){}};
  },[]);

  const set=(k,v)=>setS(o=>({...o,[k]:v}));
  const p=useMemo(()=>pd(yr,mi),[yr,mi,bhV]);
  const np=useMemo(()=>npd(yr,mi),[yr,mi,bhV]);
  const we=useMemo(()=>cd(p,np,6),[p,np]);
  const fr=useMemo(()=>termFridays(p,np),[p,np]);
  const frDates=useMemo(()=>termFridayDates(p,np),[p,np]);
  const bH=useMemo(()=>bdIn(bd,p),[bd,p]);
  const anT=useMemo(()=>an.filter(a=>a.pay_month===mi&&(!a.year||Number(a.year)===yr)),[an,mi,yr]);

  const potAmount=useCallback(pot=>calcPotAmount(pot,we,fr,s.shopRate,s.friRate,bH,anT,monthlyAmts),[we,fr,s.shopRate,s.friRate,bH,anT,monthlyAmts]);
  const setMA=(id,v)=>{dirtyMonthly.current=true;setMonthlyAmts(m=>({...m,[id]:v}))};

  const potsTotal=pots.reduce((a,p)=>a+potAmount(p),0);
  const buffer=s.income-potsTotal;
  const planningPct=s.income>0?Math.min(100,Math.round(potsTotal/s.income*100)):0;
  const dtp=daysUntil(p>=new Date(today.getFullYear(),today.getMonth(),today.getDate())?p:np);
  const ctLabel=dtp===0?'Payday today! \ud83c\udf89':dtp===1?'Payday tomorrow':dtp>0?`Payday in ${dtp} days`:`Paid ${Math.abs(dtp)}d ago`;

  const updatePot=(id,patch)=>setPots(ps=>ps.map(p=>p.id===id?{...p,...patch}:p));
  const deletePot=id=>setPots(ps=>ps.filter(p=>p.id!==id));
  const addPot=()=>{const id='pot-'+uid();setPots(ps=>[...ps,{id,name:'New pot',emoji:'\ud83d\udcb7',kind:'fixed',amount:0,note:''}]);setOpen(o=>({...o,[id]:true}));setEditing(e=>({...e,[id]:true}))};
  const addSavingsPot=()=>{const id='pot-'+uid();setPots(ps=>[...ps,{id,name:'New savings goal',emoji:'\ud83c\udfaf',kind:'savings',monthly:0,target:0,saved:0,note:''}]);setOpen(o=>({...o,[id]:true}));setEditing(e=>({...e,[id]:true}))};
  const movePot=(id,dir)=>setPots(ps=>{const i=ps.findIndex(p=>p.id===id),j=i+dir;if(j<0||j>=ps.length)return ps;const a=[...ps];[a[i],a[j]]=[a[j],a[i]];return a});
  const updateItem=(pid,iid,patch)=>updatePot(pid,{items:pots.find(p=>p.id===pid).items.map(it=>it.id===iid?{...it,...patch}:it)});
  const addItem=pid=>updatePot(pid,{items:[...pots.find(p=>p.id===pid).items,{id:uid(),name:'New item',amount:0}]});
  const removeItem=(pid,iid)=>updatePot(pid,{items:pots.find(p=>p.id===pid).items.filter(it=>it.id!==iid)});
  const uA=(id,f,v)=>setAn(l=>l.map(a=>a.id===id?{...a,[f]:(f==='amount'||f==='pay_month')?Number(v):(f==='year')?(v===''||v==null?null:Number(v)):v}:a));
  const uD=(id,f,v)=>setBd(l=>l.map(b=>b.id===id?{...b,[f]:['amount','day','month'].includes(f)?Number(v):(f==='birthYear')?(v===''||v==null?null:Number(v)):v}:b));

  const mtr=Math.max(0,(2028-yr)*12-mi);
  const bAR=useMemo(()=>rollM(s.mortBalance,s.mortRate,s.mortPmt,mtr),[s.mortBalance,s.mortRate,s.mortPmt,mtr]);
  const termAR=Math.max(12,(s.mortTermMonths||361)-mtr);

  const radar=useMemo(()=>{
    const alerts=[];
    for(let o=1;o<=3;o++){const fm=(mi+o)%12;const fmN=MF[fm];
      const fyrR=fm<mi?yr+1:yr;const items=an.filter(a=>a.pay_month===fm&&(!a.year||Number(a.year)===fyrR));
      const tot=items.reduce((a,b)=>a+Number(b.amount||0),0);
      if(tot>=150)alerts.push({k:'w',t:'\ud83d\udce1 '+fmN+': '+gS(tot)+' in calendar \u2014 '+items.map(a=>a.name).join(', ')+'.'});
      const fp=pd(fm<mi?yr+1:yr,fm);const fBds=bdIn(bd,fp);
      if(fBds.length>=2)alerts.push({k:'i',t:'\ud83d\udce1 '+fmN+': '+fBds.length+' birthdays \u2014 '+fBds.map(b=>b.name).join(', ')+' ('+gS(fBds.reduce((a,b)=>a+Number(b.amount||0),0))+')'});}
    return alerts},[mi,yr,an,bd]);

  const ins=useMemo(()=>{
    const o=[];
    if(we>=5)o.push({k:'i',t:`${we}-weekend month \u2014 shopping pot \u00a3${s.shopRate} higher.`});
    if(buffer<0)o.push({k:'e',t:'Shortfall of '+gS(Math.abs(buffer))+'. Reduce a pot or push to next month.'});
    else if(buffer<100)o.push({k:'w',t:'Tight month \u2014 only '+gS(buffer)+' left.'});
    const big=anT.reduce((a,b)=>a+Number(b.amount||0),0);
    if(big>=200)o.push({k:'w',t:'Heavy calendar month: '+gS(big)+' \u2014 '+anT.map(a=>a.name).join(', ')+'.'});
    if(bH.length)o.push({k:'i',t:bH.length+' birthday'+(bH.length>1?'s':'')+': '+bH.map(b=>b.name+' '+fd(b.dateObj)).join(', ')+'.'});
    return[...o,...radar]},[we,buffer,anT,bH,s.shopRate,radar]);

  const reset=async()=>{
    if(!confirm('Reset ALL data to defaults?'))return;
    setUndoData({s,pots,an,bd,monthlyAmts});setShowUndo(true);setTimeout(()=>setShowUndo(false),10000);
    if(sb){for(const k of KEYS){try{await sb.from('kv_store').delete().eq('key',k)}catch{}}}
    setS(DS);setPots(DP);setAn(DA);setBd(DD);setMonthlyAmts({});setOpen({});setEditing({});};
  const undoReset=()=>{if(!undoData)return;setS(undoData.s);setPots(undoData.pots);setAn(undoData.an);setBd(undoData.bd);setMonthlyAmts(undoData.monthlyAmts);setShowUndo(false);setUndoData(null)};
  const closeOut=async()=>{
    const mk=yr+':'+mi;
    if(closed[mk]){alert(MF[mi]+' '+yr+' is already closed.');return;}
    if(!confirm('Close out '+MF[mi]+' '+yr+'? Locks plan and advances savings pots.'))return;
    const perPot={};pots.filter(p=>p.kind==='fixed').forEach(p=>{perPot[p.id]=Number(monthlyAmts[p.id]??p.amount)});
    if(sb)await sb.from('kv_store').upsert({key:'pp:snap:'+yr+':'+mi,value:{income:s.income,potsTotal,buffer,pct:planningPct,at:new Date().toISOString(),perPot,final:true},updated_at:new Date().toISOString()});
    setClosed(c=>({...c,[mk]:true}));
    setPots(pots.map(p=>{if(p.kind!=='savings')return p;const c=Number(monthlyAmts[p.id]??p.monthly??0);return{...p,saved:Math.min(Number(p.target||0),Number(p.saved||0)+c)}}));
    if(s.ntfyEnabled&&s.ntfyChannel)await sendNtfy(s.ntfyChannel,MF[mi]+' closed','Buffer: '+gS(buffer)+'. '+planningPct+'% allocated.');
    const nm=(mi+1)%12;setMi(nm);setYr(nm===0?yr+1:yr);setOpen({});setEditing({});};
  const signOut=()=>{localStorage.removeItem(AUTH_KEY);location.reload()};

  if(!CONFIGURED)return h('div',{className:'err-box',style:{margin:'1rem'}},h('h2',null,'Setup required'),h('p',null,'Edit SUPABASE_URL, SUPABASE_ANON_KEY and PASSWORD at top of file.'));

    if(pot.kind==='auto-annual')return anT.length?anT.length+' event'+(anT.length===1?'':'s')+' in '+MF[mi]:'None in '+MF[mi];
    if(pot.kind==='savings'){const sv=Number(pot.saved||0),tg=Number(pot.target||0);return tg>0?gS(sv)+' of '+gS(tg)+' ('+Math.round(sv/tg*100)+'%)':'Set a target';}
    return'';};

  const renderBody=pot=>{
    if(pot.kind==='list')return h('div',null,
      h('div',{className:'eb',style:{marginBottom:'.375rem'}},'Items'),
      pot.items.map(it=>h('div',{key:it.id,className:'sub'},
        h('input',{className:'inp bare',style:{flex:1,minWidth:0},value:it.name,onChange:e=>updateItem(pot.id,it.id,{name:e.target.value})}),
        h(MI,{value:it.amount,onChange:v=>updateItem(pot.id,it.id,{amount:v}),cls:'inp-amt',wrapCls:'mw-bare'}),
        h('button',{className:'x',onClick:()=>removeItem(pot.id,it.id)},'\u00d7'))),

      return h('div',null,
        h('div',{style:{display:'flex',justifyContent:'space-between',alignItems:'center',marginBottom:'.375rem'}},
          h('div',{className:'eb'},isOvr?MF[mi]+' only':'Monthly default'),
          isOvr&&h('button',{className:'btn-lnk',onClick:()=>{setMonthlyAmts(m=>{const n={...m};delete n[pot.id];dirtyMonthly.current=true;return n})}},'\u21a9 Reset')),
        h('div',{className:'mu',style:{fontSize:'.75rem',marginBottom:'.5rem'}},isOvr?'Base is '+gS(pot.amount)+'.':'Change just for this month, or leave as default.'),
        h(MI,{value:mv,onChange:v=>setMA(pot.id,v),cls:'inp',wrapCls:'mw-lg',style:{width:140,fontSize:'1.125rem',fontWeight:600}}),
        histData[pot.id]&&Math.abs(histData[pot.id]-Math.round(Number(mv)))>5&&
          h('div',{className:'pot-ghost'},'\u2197 avg '+gS(histData[pot.id])+' last 3 months'));}

    if(pot.kind==='auto-shopping')return h('div',null,
      h('div',{className:'mu',style:{marginBottom:'.5rem'}},we+' weekend'+(we===1?'':'s')+' between '+fd(p)+' and '+fd(np)+'.'),
      h('div',{style:{display:'flex',gap:'.5rem',alignItems:'center'}},
        h('span',{style:{fontSize:'.875rem'}},'Per weekend'),
        h(MI,{value:s.shopRate,onChange:v=>set('shopRate',v),cls:'inp-amt',style:{width:80},wrapCls:'mw-bare'})));

    if(pot.kind==='auto-afterschool'){
      const diff=fr-AVG_TERM_FRIDAYS;
      const tagText=diff>=2?'↑ More Fridays than usual':diff<=-2?'↓ Fewer Fridays than usual (school holidays)':diff>0?'Slightly above average':diff<0?'Slightly below average':'Average month';
      const tagColor=diff>=2?'var(--c-er)':diff<=-2?'var(--c-ok)':'var(--c-s500)';
      return h('div',null,
        h('div',{className:'mu',style:{marginBottom:'.25rem'}},fr+' term-time Friday'+(fr===1?'':'s')+' between '+fd(p)+' and '+fd(np)+'.'),
        h('div',{style:{fontSize:'.8125rem',color:tagColor,fontWeight:500,marginBottom:'.5rem'}},tagText),
        frDates.length>0&&h('div',{className:'mu',style:{fontSize:'.75rem',marginBottom:'.5rem'}},'Dates: '+frDates.map(d=>d.toLocaleDateString('en-GB',{day:'numeric',month:'short'})).join(' · ')),
        h('div',{style:{display:'flex',gap:'.5rem',alignItems:'center'}},
          h('span',{style:{fontSize:'.875rem'}},'Per Friday'),
          h(MI,{value:s.friRate,onChange:v=>set('friRate',v),cls:'inp-amt',style:{width:80},wrapCls:'mw-bare'})));}

    if(pot.kind==='auto-birthdays'){

            h('td',{className:'mu'},b.dateObj.toLocaleDateString('en-GB',{weekday:'short',day:'numeric',month:'short'})),
            h('td',{className:'m',style:{textAlign:'right'}},gS(b.amount)))}))),
        h('div',{className:'mu',style:{marginTop:'.5rem',fontSize:'.75rem'}},'Edit amounts in \u201cCalendar & Birthdays\u201d below.'));}

    if(pot.kind==='auto-annual')return h('div',null,
      h('div',{className:'eb',style:{marginBottom:'.375rem'}},'Events in '+MF[mi]),

      anT.map(a=>h('div',{key:a.id,className:'sub'},
        h('input',{className:'inp bare',style:{flex:1,minWidth:0},value:a.name,onChange:e=>uA(a.id,'name',e.target.value)}),
